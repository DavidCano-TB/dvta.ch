name: Deploy DVDcoin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      shell: pwsh
        
    - name: Verify installation
      run: |
        Write-Host "✓ Python version:"
        python --version
        Write-Host "`n✓ Installed packages:"
        pip list
        Write-Host "`n✓ FastAPI check:"
        python -c "import fastapi; print(f'FastAPI {fastapi.__version__}')"
      shell: pwsh
      
    - name: Check database structure
      run: |
        Write-Host "✓ Checking database directories..."
        if (-not (Test-Path "data")) {
          New-Item -ItemType Directory -Path "data" -Force
          Write-Host "Created data directory"
        }
        if (-not (Test-Path "config")) {
          New-Item -ItemType Directory -Path "config" -Force
          Write-Host "Created config directory"
        }
        Write-Host "Database structure ready"
      shell: pwsh
      
    - name: Syntax check
      run: |
        Write-Host "✓ Checking Python syntax..."
        python -m py_compile main.py
        Write-Host "Syntax check passed"
      shell: pwsh
      
    - name: Run tests (if exist)
      run: |
        if (Test-Path "tests") {
          Write-Host "Running tests..."
          python -m pytest tests/ -v
        } else {
          Write-Host "No tests directory found, skipping tests"
        }
      shell: pwsh
      continue-on-error: true
      
    - name: Build summary
      run: |
        Write-Host "`n========================================="
        Write-Host "✓ DVDcoin Bank - Build Successful"
        Write-Host "========================================="
        Write-Host "Commit: $env:GITHUB_SHA"
        Write-Host "Branch: $env:GITHUB_REF_NAME"
        Write-Host "Triggered by: $env:GITHUB_ACTOR"
        Write-Host "========================================="
      shell: pwsh
      
    - name: Deploy notification
      if: success()
      run: |
        Write-Host "`n🚀 Deployment ready!"
        Write-Host "The application has been validated and is ready to run."
        Write-Host "`nTo start the server locally:"
        Write-Host "  python main.py"
        Write-Host "`nOr use the batch file:"
        Write-Host "  INICIAR_DVDBANK.bat"
      shell: pwsh
      
    - name: Send deployment email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "✅ DVDBank Deploy Exitoso - ${{ github.ref_name }}"
        to: davidcano.ch@gmail.com
        from: DVDBank Deploy <info@dvta.ch>
        body: |
          ═══════════════════════════════════════════════════════════════
          ✅ DEPLOY EXITOSO - DVDBank
          ═══════════════════════════════════════════════════════════════
          
          El deploy se ha completado correctamente.
          
          📋 DETALLES:
          
          Repositorio: ${{ github.repository }}
          Rama: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Autor: ${{ github.actor }}
          Mensaje: ${{ github.event.head_commit.message }}
          Fecha: ${{ github.event.head_commit.timestamp }}
          
          🔗 ENLACES:
          
          Ver commit: ${{ github.event.head_commit.url }}
          Ver workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          ═══════════════════════════════════════════════════════════════
          
          El sistema está listo para ser reiniciado en el servidor.
          
          Para aplicar los cambios:
          1. Haz pull en el servidor
          2. Reinicia el servicio: INICIAR_DVDBANK_DVTA.bat
          
          ═══════════════════════════════════════════════════════════════
        content_type: text/plain
        
    - name: Send failure email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "❌ DVDBank Deploy Fallido - ${{ github.ref_name }}"
        to: davidcano.ch@gmail.com
        from: DVDBank Deploy <info@dvta.ch>
        body: |
          ═══════════════════════════════════════════════════════════════
          ❌ DEPLOY FALLIDO - DVDBank
          ═══════════════════════════════════════════════════════════════
          
          El deploy ha fallado. Revisa los logs para más detalles.
          
          📋 DETALLES:
          
          Repositorio: ${{ github.repository }}
          Rama: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Autor: ${{ github.actor }}
          Mensaje: ${{ github.event.head_commit.message }}
          
          🔗 ENLACES:
          
          Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Ver commit: ${{ github.event.head_commit.url }}
          
          ═══════════════════════════════════════════════════════════════
          
          Revisa los errores en el workflow de GitHub Actions.
          
          ═══════════════════════════════════════════════════════════════
        content_type: text/plain
