name: Deploy DVDcoin Platform

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install main dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      shell: pwsh
    
    - name: Install exams module dependencies
      run: |
        if (Test-Path "modules/exams/requirements.txt") {
          Write-Host "Installing exams module dependencies..."
          pip install -r modules/exams/requirements.txt
        }
      shell: pwsh
    
    - name: Install testing dependencies
      run: |
        Write-Host "Installing testing dependencies..."
        pip install -r requirements-dev.txt
      shell: pwsh
        
    - name: Verify installation
      run: |
        Write-Host "✓ Python version:"
        python --version
        Write-Host "`n✓ Installed packages:"
        pip list
        Write-Host "`n✓ FastAPI check:"
        python -c "import fastapi; print(f'FastAPI {fastapi.__version__}')"
      shell: pwsh
      
    - name: Check database structure
      run: |
        Write-Host "✓ Checking database directories..."
        if (-not (Test-Path "data")) {
          New-Item -ItemType Directory -Path "data" -Force
          Write-Host "Created data directory"
        }
        if (-not (Test-Path "config")) {
          New-Item -ItemType Directory -Path "config" -Force
          Write-Host "Created config directory"
        }
        Write-Host "Database structure ready"
      shell: pwsh
      
    - name: Syntax check
      run: |
        Write-Host "✓ Checking Python syntax..."
        python -m py_compile main.py
        if (Test-Path "modules/exams/app_exams.py") {
          python -m py_compile modules/exams/app_exams.py
          Write-Host "Exams module syntax OK"
        }
        if (Test-Path "modules/shared/db_helper.py") {
          python -m py_compile modules/shared/db_helper.py
          Write-Host "Shared modules syntax OK"
        }
        Write-Host "All syntax checks passed"
      shell: pwsh
      
    - name: Run unit tests with 100% coverage requirement
      run: |
        Write-Host "========================================="
        Write-Host "Running Unit Tests with Coverage"
        Write-Host "========================================="
        Write-Host ""
        
        if (-not (Test-Path "tests")) {
          Write-Host "[ERROR] Tests directory not found!"
          exit 1
        }
        
        Write-Host "Executing pytest with coverage..."
        pytest tests/ -v --cov=modules --cov=main --cov-report=html --cov-report=term-missing --cov-report=xml --cov-fail-under=100
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host ""
          Write-Host "========================================="
          Write-Host "[FAILED] Tests failed or coverage < 100%"
          Write-Host "========================================="
          Write-Host ""
          Write-Host "Deployment BLOCKED - Fix tests before deploying"
          exit 1
        }
        
        Write-Host ""
        Write-Host "========================================="
        Write-Host "[SUCCESS] All tests passed - 100% coverage"
        Write-Host "========================================="
      shell: pwsh
      
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          htmlcov/
          coverage.xml
        retention-days: 30
      
    - name: Build summary
      run: |
        Write-Host "`n========================================="
        Write-Host "✓ DVDcoin Platform - Build Successful"
        Write-Host "========================================="
        Write-Host "Modules:"
        Write-Host "  • Bank (main.py) - port 8000"
        if (Test-Path "modules/exams/app_exams.py") {
          Write-Host "  • Exams (modules/exams) - port 8001"
        }
        Write-Host "`nCommit: $env:GITHUB_SHA"
        Write-Host "Branch: $env:GITHUB_REF_NAME"
        Write-Host "Triggered by: $env:GITHUB_ACTOR"
        Write-Host "========================================="
      shell: pwsh
      
    - name: Deploy notification
      if: success()
      run: |
        Write-Host "`n🚀 Deployment ready!"
        Write-Host "The platform has been validated and is ready to run."
        Write-Host "`nTo deploy on the server PC:"
        Write-Host "  1. Run DEPLOY.bat (auto-pulls from git and restarts)"
        Write-Host "  2. Or manually: git pull && ARRANCAR_TODO_PARALELO.bat"
        Write-Host "`nTo deploy from another PC:"
        Write-Host "  1. Make changes and push to GitHub"
        Write-Host "  2. On the server PC, run DEPLOY.bat"
      shell: pwsh
