name: Deploy DVDcoin Platform

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install main dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      shell: pwsh
    
    - name: Install exams module dependencies
      run: |
        if (Test-Path "modules/exams/requirements.txt") {
          Write-Host "Installing exams module dependencies..."
          pip install -r modules/exams/requirements.txt
        }
      shell: pwsh
    
    - name: Install testing dependencies
      run: |
        Write-Host "Installing testing dependencies..."
        pip install -r requirements-dev.txt
      shell: pwsh
        
    - name: Verify installation
      run: |
        Write-Host "✓ Python version:"
        python --version
        Write-Host "`n✓ Installed packages:"
        pip list
        Write-Host "`n✓ FastAPI check:"
        python -c "import fastapi; print(f'FastAPI {fastapi.__version__}')"
      shell: pwsh
      
    - name: Check database structure
      run: |
        Write-Host "✓ Checking database directories..."
        if (-not (Test-Path "data")) {
          New-Item -ItemType Directory -Path "data" -Force
          Write-Host "Created data directory"
        }
        if (-not (Test-Path "config")) {
          New-Item -ItemType Directory -Path "config" -Force
          Write-Host "Created config directory"
        }
        Write-Host "Database structure ready"
      shell: pwsh
      
    - name: Syntax check
      run: |
        Write-Host "✓ Checking Python syntax..."
        python -m py_compile main.py
        if (Test-Path "modules/exams/app_exams.py") {
          python -m py_compile modules/exams/app_exams.py
          Write-Host "Exams module syntax OK"
        }
        if (Test-Path "modules/shared/db_helper.py") {
          python -m py_compile modules/shared/db_helper.py
          Write-Host "Shared modules syntax OK"
        }
        Write-Host "All syntax checks passed"
      shell: pwsh
      
    - name: Run unit tests with 100% coverage requirement
      run: |
        Write-Host "========================================="
        Write-Host "Running Unit Tests with Coverage"
        Write-Host "========================================="
        Write-Host ""
        
        if (-not (Test-Path "tests")) {
          Write-Host "[ERROR] Tests directory not found!"
          exit 1
        }
        
        Write-Host "Executing pytest with coverage..."
        pytest tests/ -v --cov=modules --cov=main --cov-report=html --cov-report=term-missing --cov-report=xml --cov-fail-under=100
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host ""
          Write-Host "========================================="
          Write-Host "[FAILED] Tests failed or coverage < 100%"
          Write-Host "========================================="
          Write-Host ""
          Write-Host "Deployment BLOCKED - Fix tests before deploying"
          exit 1
        }
        
        Write-Host ""
        Write-Host "========================================="
        Write-Host "[SUCCESS] All tests passed - 100% coverage"
        Write-Host "========================================="
      shell: pwsh
      
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          htmlcov/
          coverage.xml
        retention-days: 30
      
    - name: Build summary
      run: |
        Write-Host "`n========================================="
        Write-Host "✓ DVDcoin Platform - Build Successful"
        Write-Host "========================================="
        Write-Host "Modules:"
        Write-Host "  • Bank (main.py) - port 8000"
        if (Test-Path "modules/exams/app_exams.py") {
          Write-Host "  • Exams (modules/exams) - port 8001"
        }
        Write-Host "`nCommit: $env:GITHUB_SHA"
        Write-Host "Branch: $env:GITHUB_REF_NAME"
        Write-Host "Triggered by: $env:GITHUB_ACTOR"
        Write-Host "========================================="
      shell: pwsh
      
    - name: Deploy notification
      if: success()
      run: |
        Write-Host "`n🚀 Deployment ready!"
        Write-Host "The platform has been validated and is ready to run."
        Write-Host "`nTo start all modules:"
        Write-Host "  ARRANCAR_TODO.bat"
        Write-Host "`nOr start individually:"
        Write-Host "  • Bank:  python main.py"
        Write-Host "  • Exams: cd modules/exams && python app_exams.py"
        Write-Host "`nTo start Cloudflare Tunnel:"
        Write-Host "  INICIAR_TUNNEL_MULTI.bat"
      shell: pwsh
      
    - name: Send deployment email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "✅ DVDcoin Platform Deploy Exitoso - ${{ github.ref_name }}"
        to: davidcano.ch@gmail.com
        from: DVDcoin Platform <info@dvta.ch>
        body: |
          ═══════════════════════════════════════════════════════════════
          ✅ DEPLOY EXITOSO - DVDcoin Platform
          ═══════════════════════════════════════════════════════════════
          
          El deploy se ha completado correctamente.
          
          📦 MÓDULOS DESPLEGADOS:
          • Bank (dvdbank.com) - puerto 8000
          • Exams (dvta.ch) - puerto 8001
          
          📋 DETALLES:
          
          Repositorio: ${{ github.repository }}
          Rama: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Autor: ${{ github.actor }}
          Mensaje: ${{ github.event.head_commit.message }}
          Fecha: ${{ github.event.head_commit.timestamp }}
          
          🔗 ENLACES:
          
          Ver commit: ${{ github.event.head_commit.url }}
          Ver workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          ═══════════════════════════════════════════════════════════════
          
          El sistema está listo para ser reiniciado en el servidor.
          
          Para aplicar los cambios:
          1. Haz pull en el servidor: git pull
          2. Reinicia todos los módulos: ARRANCAR_TODO.bat
          3. Inicia el tunnel: INICIAR_TUNNEL_MULTI.bat
          
          ═══════════════════════════════════════════════════════════════
        content_type: text/plain
        
    - name: Send failure email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "❌ DVDcoin Platform Deploy Fallido - ${{ github.ref_name }}"
        to: davidcano.ch@gmail.com
        from: DVDcoin Platform <info@dvta.ch>
        body: |
          ═══════════════════════════════════════════════════════════════
          ❌ DEPLOY FALLIDO - DVDcoin Platform
          ═══════════════════════════════════════════════════════════════
          
          El deploy ha fallado. Revisa los logs para más detalles.
          
          📋 DETALLES:
          
          Repositorio: ${{ github.repository }}
          Rama: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Autor: ${{ github.actor }}
          Mensaje: ${{ github.event.head_commit.message }}
          
          🔗 ENLACES:
          
          Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Ver commit: ${{ github.event.head_commit.url }}
          
          ═══════════════════════════════════════════════════════════════
          
          Revisa los errores en el workflow de GitHub Actions.
          
          ═══════════════════════════════════════════════════════════════
        content_type: text/plain
