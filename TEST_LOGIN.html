<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Test Login - DVDcoin Bank</title>
<style>
body {
  font-family: monospace;
  background: #0A0E14;
  color: #E8EDF5;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}
.test-section {
  background: #141A24;
  border: 1px solid #6B9BD4;
  border-radius: 8px;
  padding: 20px;
  margin: 20px 0;
}
button {
  background: #6B9BD4;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  margin: 5px;
}
button:hover {
  background: #8BB3E8;
}
input {
  background: #0F1419;
  border: 1px solid #6B9BD4;
  color: #E8EDF5;
  padding: 8px;
  border-radius: 5px;
  margin: 5px;
  width: 200px;
}
#log {
  background: #0F1419;
  border: 1px solid #6B9BD4;
  border-radius: 5px;
  padding: 15px;
  margin-top: 20px;
  max-height: 400px;
  overflow-y: auto;
  font-size: 12px;
}
.log-entry {
  margin: 5px 0;
  padding: 5px;
  border-left: 3px solid #6B9BD4;
  padding-left: 10px;
}
.log-error {
  border-left-color: #E05260;
  color: #E05260;
}
.log-success {
  border-left-color: #38B87A;
  color: #38B87A;
}
</style>
</head>
<body>

<h1>🔐 Test de Login - DVDcoin Bank</h1>

<div class="test-section">
  <h2>1. Test de Conectividad</h2>
  <button onclick="testServer()">Test Servidor</button>
  <button onclick="testEndpoints()">Test Endpoints</button>
</div>

<div class="test-section">
  <h2>2. Test de Login</h2>
  <div>
    <input type="text" id="username" placeholder="Username" value="dvd">
    <input type="password" id="password" placeholder="Password" value="">
  </div>
  <button onclick="testLogin()">Test Login</button>
  <button onclick="testLoginAlias()">Test Login (Alias /api/login)</button>
</div>

<div class="test-section">
  <h2>3. Test de Token</h2>
  <button onclick="testMe()">Test /bank/api/me</button>
  <button onclick="testMeAlias()">Test /api/me (Alias)</button>
  <button onclick="clearToken()">Limpiar Token</button>
</div>

<div class="test-section">
  <h2>4. Limpiar Cache</h2>
  <button onclick="clearCache()">Limpiar Cache del Navegador</button>
  <button onclick="unregisterSW()">Desregistrar Service Worker</button>
  <button onclick="hardReload()">Recarga Forzada</button>
</div>

<div id="log"></div>

<script>
const API = location.origin;
let token = localStorage.getItem('dvd_token');

function log(msg, type = 'info') {
  const logDiv = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type === 'error' ? ' log-error' : type === 'success' ? ' log-success' : '');
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logDiv.insertBefore(entry, logDiv.firstChild);
}

async function testServer() {
  log('Testing server connectivity...');
  try {
    const r = await fetch(API + '/bank/api/gallery', {
      headers: { 'ngrok-skip-browser-warning': '1' }
    });
    if (r.ok) {
      log('✓ Server is running on port 8000', 'success');
    } else {
      log(`✗ Server responded with status ${r.status}`, 'error');
    }
  } catch (e) {
    log(`✗ Server connection failed: ${e.message}`, 'error');
  }
}

async function testEndpoints() {
  log('Testing endpoints...');
  const endpoints = [
    '/bank/api/gallery',
    '/api/gallery',
  ];
  
  for (const ep of endpoints) {
    try {
      const r = await fetch(API + ep, {
        headers: { 'ngrok-skip-browser-warning': '1' }
      });
      log(`${ep}: ${r.status} ${r.ok ? '✓' : '✗'}`, r.ok ? 'success' : 'error');
    } catch (e) {
      log(`${ep}: ERROR - ${e.message}`, 'error');
    }
  }
}

async function testLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  if (!username || !password) {
    log('Please enter username and password', 'error');
    return;
  }
  
  log(`Attempting login as "${username}" to /bank/api/login...`);
  
  try {
    const r = await fetch(API + '/bank/api/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': '1'
      },
      body: JSON.stringify({ username, password })
    });
    
    const data = await r.json();
    
    if (r.ok) {
      token = data.token;
      localStorage.setItem('dvd_token', token);
      log(`✓ Login successful! Token: ${token.substring(0, 20)}...`, 'success');
      log(`User: ${data.username}, Admin: ${data.is_admin}`, 'success');
    } else {
      log(`✗ Login failed: ${data.detail || 'Unknown error'}`, 'error');
    }
  } catch (e) {
    log(`✗ Login error: ${e.message}`, 'error');
  }
}

async function testLoginAlias() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  if (!username || !password) {
    log('Please enter username and password', 'error');
    return;
  }
  
  log(`Attempting login as "${username}" to /api/login (alias)...`);
  
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': '1'
      },
      body: JSON.stringify({ username, password })
    });
    
    const data = await r.json();
    
    if (r.ok) {
      token = data.token;
      localStorage.setItem('dvd_token', token);
      log(`✓ Login successful via alias! Token: ${token.substring(0, 20)}...`, 'success');
      log(`User: ${data.username}, Admin: ${data.is_admin}`, 'success');
    } else {
      log(`✗ Login failed: ${data.detail || 'Unknown error'}`, 'error');
    }
  } catch (e) {
    log(`✗ Login error: ${e.message}`, 'error');
  }
}

async function testMe() {
  if (!token) {
    log('No token found. Please login first.', 'error');
    return;
  }
  
  log('Testing /bank/api/me...');
  
  try {
    const r = await fetch(API + '/bank/api/me', {
      headers: {
        'Authorization': 'Bearer ' + token,
        'ngrok-skip-browser-warning': '1'
      }
    });
    
    const data = await r.json();
    
    if (r.ok) {
      log(`✓ /bank/api/me successful!`, 'success');
      log(`User: ${data.username}, Balance: ${data.balance}`, 'success');
    } else {
      log(`✗ /bank/api/me failed: ${data.detail || 'Unknown error'}`, 'error');
    }
  } catch (e) {
    log(`✗ Error: ${e.message}`, 'error');
  }
}

async function testMeAlias() {
  if (!token) {
    log('No token found. Please login first.', 'error');
    return;
  }
  
  log('Testing /api/me (alias)...');
  
  try {
    const r = await fetch(API + '/api/me', {
      headers: {
        'Authorization': 'Bearer ' + token,
        'ngrok-skip-browser-warning': '1'
      }
    });
    
    const data = await r.json();
    
    if (r.ok) {
      log(`✓ /api/me (alias) successful!`, 'success');
      log(`User: ${data.username}, Balance: ${data.balance}`, 'success');
    } else {
      log(`✗ /api/me failed: ${data.detail || 'Unknown error'}`, 'error');
    }
  } catch (e) {
    log(`✗ Error: ${e.message}`, 'error');
  }
}

function clearToken() {
  localStorage.removeItem('dvd_token');
  localStorage.removeItem('dvd_token_refreshed_at');
  token = null;
  log('✓ Token cleared', 'success');
}

async function clearCache() {
  if ('caches' in window) {
    const names = await caches.keys();
    await Promise.all(names.map(name => caches.delete(name)));
    log(`✓ Cleared ${names.length} cache(s)`, 'success');
  } else {
    log('Cache API not available', 'error');
  }
}

async function unregisterSW() {
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) {
      await reg.unregister();
    }
    log(`✓ Unregistered ${regs.length} service worker(s)`, 'success');
  } else {
    log('Service Worker not available', 'error');
  }
}

function hardReload() {
  log('Performing hard reload...', 'success');
  setTimeout(() => {
    location.reload(true);
  }, 500);
}

// Auto-test on load
window.addEventListener('load', () => {
  log('Test page loaded. Ready to test.');
  if (token) {
    log(`Found existing token: ${token.substring(0, 20)}...`);
  }
});
</script>

</body>
</html>
