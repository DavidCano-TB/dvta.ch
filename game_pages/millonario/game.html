<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04040A">
<title>¿Quién quiere ser millonario?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#D4A843;--gold2:#F0C866;--gold3:#8B6010;--gold4:#5A3A06;--noir:#04040A;--n2:#08080F;--n3:#0C0C1A;--n4:#111120;--glass:rgba(255,255,255,.04);--border:rgba(212,168,67,.13);--border2:rgba(212,168,67,.30);--text:#EAE6D8;--text2:#9A9070;--text3:#504430;--green:#38B87A;--red:#C83060;--blue:#4878D8;--orange:#E07840;--r:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-size:15px;}
body{background:var(--noir);color:var(--text);font-family:'DM Mono',monospace;min-height:100%;-webkit-font-smoothing:antialiased;padding-bottom:24px;}
button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;}
.hdr{position:sticky;top:0;z-index:50;background:rgba(4,4,10,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3) 30%,var(--gold) 50%,var(--gold3) 70%,transparent);}
.hdrLogo{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--gold2);flex:1;}
.connDot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.connDot.on{background:var(--green);box-shadow:0 0 6px rgba(56,184,122,.6);}
.overlay{position:fixed;inset:0;background:rgba(4,4,10,.97);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;}
.ovTitle{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold2);}
.ovSub{font-size:.8rem;color:var(--text2);max-width:360px;line-height:1.6;}
.ovPrize{font-family:'Playfair Display',serif;font-size:2.8rem;color:var(--gold);}
.wrap{max-width:760px;margin:0 auto;padding:14px;}
/* Player */
.playerHead{text-align:center;margin-bottom:16px;}
.playerName{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold2);}
.playerLvl{font-size:.7rem;color:var(--text2);margin-top:3px;}
/* Layout */
.layout{display:grid;grid-template-columns:1fr 200px;gap:14px;}
@media(max-width:560px){.layout{grid-template-columns:1fr;}}
/* Question card */
.qcard{background:var(--n3);border:1px solid var(--border2);border-radius:var(--r);padding:18px;box-shadow:0 0 40px rgba(212,168,67,.07);margin-bottom:12px;}
.qprize{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);text-align:center;margin-bottom:14px;}
.qtext{font-size:.92rem;color:var(--text);line-height:1.55;text-align:center;min-height:52px;margin-bottom:18px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:var(--r);border:1px solid var(--border2);background:rgba(212,168,67,.04);transition:all .25s;cursor:default;}
.opt.clickable{cursor:pointer;}
.opt.clickable:hover{background:rgba(212,168,67,.1);border-color:var(--gold);}
.opt.selected{background:rgba(212,168,67,.18);border-color:var(--gold);box-shadow:0 0 14px rgba(212,168,67,.2);}
.opt.correct{background:rgba(56,184,122,.18);border-color:var(--green);box-shadow:0 0 14px rgba(56,184,122,.2);}
.opt.wrong{background:rgba(200,48,96,.18);border-color:var(--red);}
.opt.elim{opacity:.25;pointer-events:none;}
.optL{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:700;color:var(--gold);min-width:20px;}
.optT{font-size:.78rem;color:var(--text);line-height:1.3;}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:1px solid;border-radius:var(--r);padding:8px 14px;font-size:.7rem;font-family:'DM Mono',monospace;letter-spacing:.05em;transition:all .2s;cursor:pointer;font-weight:500;}
.btnG{background:rgba(56,184,122,.12);border-color:rgba(56,184,122,.4);color:var(--green);}
.btnG:hover{background:rgba(56,184,122,.22);border-color:var(--green);}
.btnD{background:rgba(200,48,96,.12);border-color:rgba(200,48,96,.35);color:#e05080;}
.btnD:hover{background:rgba(200,48,96,.22);}
.btnO{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.3);color:var(--gold2);}
.btnN{background:var(--glass);border-color:var(--border);color:var(--text2);}
.btnSm{padding:5px 10px;font-size:.65rem;}
.adminBar{display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;margin-top:8px;border-top:1px solid var(--border);}
/* Ladder */
.comodin{padding:7px 10px;border-radius:8px;border:1px solid var(--border);text-align:center;font-size:.7rem;color:var(--text2);margin-bottom:8px;transition:all .2s;}
.comodin.used{opacity:.3;text-decoration:line-through;}
.ladder{display:flex;flex-direction:column-reverse;gap:2px;max-height:500px;overflow-y:auto;}
.rung{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-size:.62rem;color:var(--text3);border:1px solid transparent;transition:all .2s;}
.rung.cur{background:rgba(212,168,67,.18);border-color:var(--gold);color:var(--gold2);font-weight:700;box-shadow:0 0 10px rgba(212,168,67,.18);}
.rung.done{color:var(--text2);background:rgba(255,255,255,.02);}
.rung.guar{color:var(--orange);}
.rungN{font-size:.65rem;min-width:18px;text-align:right;color:var(--text3);}
.rungP{flex:1;}
</style>
</head>
<body>
<div class="hdr">
  <span style="font-size:1.3rem">💰</span>
  <div class="hdrLogo">¿Quién quiere ser millonario?</div>
  <div id="adminBadge" style="display:none;font-size:.65rem;padding:3px 8px;border-radius:6px;background:rgba(56,184,122,.15);border:1px solid rgba(56,184,122,.4);color:var(--green);font-weight:600;">ADMIN</div>
  <div class="connDot" id="connDot"></div>
</div>
<div class="overlay" id="overlay">
  <div class="ovTitle" id="ovTitle">💰 Millonario</div>
  <div class="ovSub" id="ovSub">Esperando partida…</div>
  <div class="ovPrize" id="ovPrize" style="display:none"></div>
</div>
<div class="wrap" id="wrap" style="display:none">
  <div class="playerHead"><div class="playerName" id="pName">—</div><div class="playerLvl" id="pLvl">—</div></div>
  <div class="layout">
    <div>
      <div class="qcard">
        <div class="qprize" id="qPrize">—</div>
        <div class="qtext"  id="qText">—</div>
        <div id="answerBox" style="display:none;background:rgba(56,184,122,.12);border:1px solid rgba(56,184,122,.4);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:.75rem;color:var(--green);text-align:center;"></div>
        <div class="opts"   id="opts"></div>
        <div class="adminBar" id="adminBar" style="display:none">
          <!-- Panel de configuración inicial -->
          <div id="adminConfigPanel" style="display:none;width:100%;margin-bottom:10px">
            <div style="margin-bottom:8px">
              <label style="font-size:.65rem;color:var(--text2);display:block;margin-bottom:4px">Jugador:</label>
              <input type="text" id="playerName" placeholder="Nombre del jugador" style="width:100%;padding:6px;background:var(--n4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.75rem">
            </div>
            <button class="btn btnG" style="width:100%" onclick="startMillonario()">▶ Iniciar Juego</button>
          </div>
          <!-- Controles durante el juego -->
          <div id="adminGameControls" style="display:none;width:100%">
            <button class="btn btnG btnSm" onclick="ws.send(JSON.stringify({action:'correct'}))">✓ Correcto</button>
            <button class="btn btnD btnSm" onclick="ws.send(JSON.stringify({action:'wrong'}))">✗ Fallo</button>
            <button class="btn btnO btnSm" id="btnCom" onclick="ws.send(JSON.stringify({action:'comodin_50'}))">50/50</button>
            <button class="btn btnN btnSm" onclick="ws.send(JSON.stringify({action:'reset'}))">↺ Reset</button>
          </div>
        </div>
        <div class="adminBar" id="decisionBar" style="display:none;border-top:none;padding-top:0;margin-top:12px">
          <button class="btn btnG btnSm" style="flex:1" onclick="ws.send(JSON.stringify({action:'siguiente'}))">➡️ Siguiente Pregunta</button>
          <button class="btn btnO btnSm" style="flex:1" onclick="ws.send(JSON.stringify({action:'plantarse'}))">🎯 Plantarse</button>
        </div>
      </div>
    </div>
    <div>
      <div class="comodin" id="comodin">🃏 Comodín 50/50</div>
      <div class="ladder" id="ladder"></div>
    </div>
  </div>
</div>
<script>
'use strict';
const e=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ps=new URLSearchParams(location.search);
const tok=ps.get('token')||localStorage.getItem('dvd_token')||'';
const WSB=location.protocol==='https:'?'wss://'+location.host:'ws://'+location.host;
let ws,st=null,me=null,isAdmin=false;

async function init(){
  if(!tok){showOv('Sin sesión','Abre el juego desde la aplicación.');return;}
  try{
    const r=await fetch('/api/me',{headers:{'Authorization':'Bearer '+tok,'ngrok-skip-browser-warning':'1'}});
    if(r.ok){
      me=await r.json();
      isAdmin=!!me.is_admin;
      console.log('Usuario cargado:', me.username, 'isAdmin:', isAdmin);
    } else {
      console.error('Error al cargar usuario:', r.status);
    }
  }catch(err){
    console.error('Error en fetch /api/me:', err);
  }
  connect();
}
function connect(){
  ws=new WebSocket(WSB+'/ws/millonario?token='+encodeURIComponent(tok));
  ws.onopen=()=>document.getElementById('connDot').className='connDot on';
  ws.onmessage=ev=>{try{if(JSON.parse(ev.data).type==='state'){st=JSON.parse(ev.data);render();}}catch(_){}};
  ws.onclose=()=>{document.getElementById('connDot').className='connDot';setTimeout(connect,3000);};
}
function render(){
  if(!st)return;
  // Show admin badge
  document.getElementById('adminBadge').style.display = isAdmin ? '' : 'none';
  // Si no está habilitado Y no soy admin, mostrar overlay
  if(!st.enabled&&!isAdmin){showOv('💰 Millonario','El juego no ha sido iniciado por el host.');return;}
  // Si está en waiting Y no soy admin, mostrar overlay
  if(st.status==='waiting'&&!isAdmin){showOv('💰 Millonario','Esperando a que comience la partida…');return;}
  if(st.status==='wrong'){showOv('😔 Respuesta incorrecta',`@${st.player} se lleva: ${st.ultimo_premio||'nada'}`,st.ultimo_premio);return;}
  if(st.status==='plantado'){showOv('🎯 ¡Se planta!',`@${st.player} se retira con: ${st.ultimo_premio||'nada'}`,st.ultimo_premio);return;}
  if(st.status==='finished'){showOv('🏆 ¡¡Enhorabuena!!',`@${st.player} gana la máxima cifra`,'1000 DVDcoins');return;}
  hideOv();
  document.getElementById('wrap').style.display='';
  document.getElementById('pName').textContent='@'+(st.player||'—');
  document.getElementById('pLvl').textContent=st.pregunta?`Nivel ${st.nivel} / 10`:'—';
  const q=st.pregunta;
  document.getElementById('qPrize').textContent=q?q.premio:'—';
  document.getElementById('qText').textContent=q?q.pregunta:'—';
  // Show correct answer for admin (DVD)
  const ansBox=document.getElementById('answerBox');
  console.log('DEBUG:', {isAdmin, hasQ: !!q, hasResp: q?.respuesta, status: st.status, me, waiting: st.waiting_decision});
  if(isAdmin && q && q.respuesta){
    ansBox.style.display='';
    const allOpts = q.opciones_all || q.opciones || {};
    ansBox.innerHTML=`<strong style="color:var(--green)">✓ Respuesta correcta: ${q.respuesta}</strong> — ${e(allOpts[q.respuesta]||'')}`;
  }else ansBox.style.display='none';
  // Options
  const oe=document.getElementById('opts');
  if(q){
    const all=q.opciones_all||q.opciones||{},elim=st.eliminadas||[],sel=st.selected_option||'',rev=st.reveal_result;
    oe.innerHTML=['A','B','C','D'].map(k=>{
      if(!all[k])return'';
      const isE=elim.includes(k),isS=sel===k,isC=rev&&q.respuesta===k,isW=rev==='wrong'&&sel===k&&k!==q.respuesta;
      const cls='opt'+(isE?' elim':isC?' correct':isW?' wrong':isS?' selected':'')+(isAdmin&&!isE&&st.status==='playing'?' clickable':'');
      const click=isAdmin&&!isE&&st.status==='playing'?`onclick="ws.send(JSON.stringify({action:'select_option',letter:'${k}'}))"`:'' ;
      return`<div class="${cls}" ${click}><span class="optL">${k}</span><span class="optT">${e(all[k])}</span></div>`;
    }).join('');
  }else oe.innerHTML='';
  // Admin bar - show during playing
  const adminBar = document.getElementById('adminBar');
  const adminConfigPanel = document.getElementById('adminConfigPanel');
  const adminGameControls = document.getElementById('adminGameControls');
  
  if(isAdmin){
    adminBar.style.display='';
    // Mostrar panel de configuración si no está habilitado
    if(!st.enabled){
      adminConfigPanel.style.display='';
      adminGameControls.style.display='none';
    }else{
      adminConfigPanel.style.display='none';
      adminGameControls.style.display=st.status==='playing'?'':'none';
    }
  }else{
    adminBar.style.display='none';
  }
  
  // Decision bar - show after correct answer (waiting_decision)
  document.getElementById('decisionBar').style.display=isAdmin&&st.waiting_decision?'':'none';
  const bc=document.getElementById('btnCom');
  if(bc){bc.disabled=st.comodin_50;bc.style.opacity=st.comodin_50?'.35':'';}
  // Comodin
  document.getElementById('comodin').className='comodin'+(st.comodin_50?' used':'');
  // Ladder
  const PREMIOS=st.premios||[];
  document.getElementById('ladder').innerHTML=PREMIOS.map((p,i)=>{
    const n=i+1,cur=st.nivel===n&&(st.status==='playing'||st.waiting_decision),done=st.nivel>n,guar=[5,10].includes(n);
    return`<div class="rung ${cur?'cur':done?'done':guar?'guar':''}"><span class="rungN">${n}</span><span class="rungP">${p}</span>${guar?'<span style="color:var(--orange);font-size:.55rem">★</span>':''}</div>`;
  }).join('');
}
function startMillonario(){
  const player=document.getElementById('playerName').value.trim();
  if(!player){alert('Por favor, introduce el nombre del jugador');return;}
  ws.send(JSON.stringify({action:'setup',player:player}));
}
function showOv(t,m,prize){
  document.getElementById('ovTitle').textContent=t;document.getElementById('ovSub').textContent=m;
  const pp=document.getElementById('ovPrize');if(prize){pp.style.display='';pp.textContent=prize;}else pp.style.display='none';
  document.getElementById('overlay').style.display='';document.getElementById('wrap').style.display='none';
}
function hideOv(){document.getElementById('overlay').style.display='none';}
init();
</script>
</body>
</html>
