<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04040A">
<title>⚓ Hundir la Flota — DVDcoin Bank</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4A843;--gold2:#F0C866;--gold3:#8B6010;--gold4:#5A3A06;
  --noir:#04040A;--n2:#08080F;--n3:#0C0C1A;--n4:#111120;
  --glass:rgba(255,255,255,.04);
  --border:rgba(212,168,67,.13);--border2:rgba(212,168,67,.30);
  --text:#EAE6D8;--text2:#9A9070;--text3:#504430;
  --green:#38B87A;--red:#C83060;--blue:#4878D8;
  --navy:#1E3A5F;--water:#2E5C8A;--hit:#FF4444;--miss:#4A90E2;
  --r:10px;--rL:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;height:100%;}
body{background:var(--noir);color:var(--text);font-family:'DM Mono',monospace;min-height:100%;-webkit-font-smoothing:antialiased;padding:20px;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--gold4);border-radius:2px;}
button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;}

.container{max-width:1200px;margin:0 auto;}
.header{text-align:center;margin-bottom:30px;}
.title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--blue);margin-bottom:10px;}
.subtitle{font-size:.85rem;color:var(--text2);letter-spacing:.1em;}

.gameArea{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px;}
@media(max-width:900px){.gameArea{grid-template-columns:1fr;}}

.panel{background:var(--n3);border:1px solid var(--border);border-radius:var(--rL);padding:20px;}
.panelTitle{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--blue);margin-bottom:15px;text-align:center;}

.board{display:grid;gap:2px;margin:0 auto;max-width:500px;background:var(--border);padding:2px;border-radius:var(--r);}
.cell{aspect-ratio:1;background:var(--navy);border:1px solid var(--water);cursor:pointer;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center;font-size:.7rem;}
.cell:hover{background:rgba(72,120,216,.2);}
.cell.ship{background:linear-gradient(135deg, #4A5568 0%, #2D3748 100%);border-color:var(--blue);position:relative;}
.cell.ship::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);width:70%;height:70%;background:linear-gradient(180deg, #718096 0%, #4A5568 100%);border-radius:2px;box-shadow:inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 4px rgba(0,0,0,0.3);}
.cell.ship.horizontal::before{width:80%;height:50%;border-radius:4px 4px 2px 2px;}
.cell.ship.vertical::before{width:50%;height:80%;border-radius:2px 4px 4px 2px;}
.cell.ship.bow-h::before{background:linear-gradient(90deg, #4A5568 0%, #718096 50%, #4A5568 100%);border-radius:50% 4px 4px 50%;width:85%;height:55%;}
.cell.ship.bow-v::before{background:linear-gradient(180deg, #4A5568 0%, #718096 50%, #4A5568 100%);border-radius:50% 50% 4px 4px;width:55%;height:85%;}
.cell.ship.stern-h::before{border-radius:4px 50% 50% 4px;width:85%;height:55%;}
.cell.ship.stern-v::before{border-radius:4px 4px 50% 50%;width:55%;height:85%;}
.cell.ship.selected{background:var(--gold);border-color:var(--gold2);box-shadow:0 0 10px var(--gold);}
.cell.hit{background:var(--hit);border-color:#FF0000;}
.cell.hit::after{content:'💥';font-size:1.2em;animation:hitPulse 0.5s ease-out;}
.cell.miss{background:var(--miss);border-color:#6AB0FF;}
.cell.miss::after{content:'○';color:#fff;font-size:1em;animation:missPulse 0.5s ease-out;}
.cell.sunk{background:#8B0000;border-color:#FF0000;}

@keyframes hitPulse{0%{transform:scale(0);opacity:0;}50%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);opacity:1;}}
@keyframes missPulse{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes victoryBounce{0%{transform:scale(0) rotate(-180deg);opacity:0;}60%{transform:scale(1.1) rotate(10deg);opacity:1;}100%{transform:scale(1) rotate(0deg);opacity:1;}}

.shipControls{margin-top:20px;}
.shipButtons{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:15px;}
.shipBtn{background:rgba(72,120,216,.12);border:2px solid rgba(72,120,216,.4);color:var(--blue);border-radius:var(--r);padding:12px;font-size:.75rem;font-family:'DM Mono',monospace;font-weight:600;letter-spacing:.05em;transition:all .2s;position:relative;}
.shipBtn:hover:not(:disabled){background:rgba(72,120,216,.25);border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 12px rgba(72,120,216,.3);}
.shipBtn.active{background:rgba(212,168,67,.2);border-color:var(--gold);color:var(--gold2);box-shadow:0 0 15px rgba(212,168,67,.4);}
.shipBtn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.shipBtn .count{display:block;font-size:1.1rem;margin-bottom:4px;}
.shipBtn .remaining{position:absolute;top:4px;right:6px;background:var(--gold);color:var(--noir);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;}
.shipBtn.active .remaining{background:var(--green);animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

.orientationToggle{display:flex;gap:8px;margin-bottom:15px;}
.orientBtn{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:10px;font-size:.72rem;transition:all .2s;}
.orientBtn.active{background:rgba(72,120,216,.2);border-color:var(--blue);color:var(--blue);}

.actionButtons{display:flex;gap:10px;margin-top:15px;}
.btn{flex:1;border:1px solid;border-radius:var(--r);padding:12px;font-size:.75rem;font-family:'DM Mono',monospace;font-weight:600;letter-spacing:.06em;transition:all .2s;}
.btnG{background:rgba(56,184,122,.12);border-color:rgba(56,184,122,.4);color:var(--green);}
.btnG:hover:not(:disabled){background:rgba(56,184,122,.25);border-color:var(--green);box-shadow:0 0 16px rgba(56,184,122,.3);}
.btnR{background:rgba(200,48,96,.12);border-color:rgba(200,48,96,.4);color:#e05080;}
.btnR:hover:not(:disabled){background:rgba(200,48,96,.25);border-color:var(--red);}
.btnO{background:rgba(212,168,67,.12);border-color:rgba(212,168,67,.4);color:var(--gold2);}
.btnO:hover:not(:disabled){background:rgba(212,168,67,.25);border-color:var(--gold);}
.btn:disabled{opacity:.35;cursor:not-allowed;}

.status{background:rgba(72,120,216,.08);border:1px solid rgba(72,120,216,.3);border-radius:var(--r);padding:12px;text-align:center;font-size:.8rem;color:var(--blue);margin-bottom:15px;}
.status.ready{background:rgba(56,184,122,.08);border-color:rgba(56,184,122,.3);color:var(--green);}
.status.error{background:rgba(200,48,96,.08);border-color:rgba(200,48,96,.3);color:#e05080;}

.players{display:grid;gap:10px;margin-top:20px;}
.playerCard{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;justify-content:space-between;align-items:center;}
.playerName{font-size:.85rem;color:var(--text);}
.playerStatus{font-size:.7rem;color:var(--text3);}
.playerStatus.ready{color:var(--green);}
.playerStatus.turn{color:var(--gold2);font-weight:700;}

.legend{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-top:15px;font-size:.7rem;color:var(--text3);}
.legendItem{display:flex;align-items:center;gap:5px;}
.legendBox{width:16px;height:16px;border-radius:3px;border:1px solid;}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">⚓ Hundir la Flota</div>
    <div class="subtitle" id="subtitle">Cargando...</div>
  </div>

  <div class="status" id="status">Conectando al servidor...</div>
  
  <!-- Modal de video para animaciones -->
  <div id="videoModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10000;align-items:center;justify-content:center;">
    <video id="attackVideo" style="max-width:80%;max-height:80%;border-radius:20px;" autoplay></video>
  </div>
  
  <!-- Modal de victoria -->
  <div id="victoryModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10001;align-items:center;justify-content:center;flex-direction:column;">
    <canvas id="confettiCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
    <div style="position:relative;z-index:1;text-align:center;animation:victoryBounce 1s ease-out;">
      <div style="font-size:6rem;margin-bottom:20px;">🏆</div>
      <div style="font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold2);margin-bottom:15px;">¡FELICIDADES!</div>
      <div id="winnerName" style="font-size:2rem;color:var(--text);margin-bottom:30px;"></div>
      <div style="font-size:1.5rem;color:var(--text2);margin-bottom:40px;">¡Has ganado la batalla naval!</div>
      <div style="display:flex;gap:15px;justify-content:center;">
        <button onclick="resetAndNewGame()" style="background:rgba(212,168,67,.2);border:2px solid var(--gold);color:var(--gold2);border-radius:10px;padding:15px 30px;font-size:1rem;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;transition:all .2s;" onmouseover="this.style.background='rgba(212,168,67,.35)';this.style.transform='translateY(-2px)'" onmouseout="this.style.background='rgba(212,168,67,.2)';this.style.transform='translateY(0)'">
          🔄 Nueva Partida
        </button>
        <button onclick="location.href="/bank/"" style="background:rgba(72,120,216,.2);border:2px solid var(--blue);color:var(--blue);border-radius:10px;padding:15px 30px;font-size:1rem;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;transition:all .2s;" onmouseover="this.style.background='rgba(72,120,216,.35)';this.style.transform='translateY(-2px)'" onmouseout="this.style.background='rgba(72,120,216,.2)';this.style.transform='translateY(0)'">
          🏠 Volver al Inicio
        </button>
      </div>
    </div>
  </div>

  <div class="gameArea">
    <!-- Panel izquierdo: Tu tablero -->
    <div class="panel">
      <div class="panelTitle">🛡️ Tu Flota</div>
      <div class="board" id="myBoard"></div>
      
      <div class="shipControls" id="setupControls" style="display:none;">
        <div class="orientationToggle">
          <button class="orientBtn active" id="orientH" onclick="setOrientation('H')">➡️ Horizontal</button>
          <button class="orientBtn" id="orientV" onclick="setOrientation('V')">⬇️ Vertical</button>
        </div>
        
        <div class="shipButtons" id="shipButtons"></div>
        
        <div class="actionButtons">
          <button class="btn btnO" id="rotateBtn" onclick="rotateSelected()" style="display:none">🔄 Rotar</button>
          <button class="btn btnR" onclick="clearSelected()">🗑️ Borrar</button>
          <button class="btn btnO" onclick="clearAll()">↺ Limpiar todo</button>
          <button class="btn btnG" id="readyBtn" onclick="markReady()" disabled>✓ Validar</button>
        </div>
      </div>

      <div class="legend">
        <div class="legendItem"><div class="legendBox" style="background:var(--water);border-color:var(--blue);"></div> Barco</div>
        <div class="legendItem"><div class="legendBox" style="background:var(--hit);border-color:#FF0000;"></div> Impacto</div>
        <div class="legendItem"><div class="legendBox" style="background:var(--miss);border-color:#6AB0FF;"></div> Fallo</div>
      </div>
    </div>

    <!-- Panel derecho: Tablero enemigo (solo en fase de ataque) -->
    <div class="panel" id="enemyPanel" style="display:none;">
      <div class="panelTitle" id="enemyPanelTitle">🎯 Tablero de Ataque</div>
      <div class="board" id="enemyBoard"></div>
      
      <div class="actionButtons" style="margin-top:15px;">
        <button class="btn btnR" id="attackBtn" onclick="executeAttack()" disabled>💣 Atacar Posición Seleccionada</button>
      </div>
      
      <div class="players" id="playersList"></div>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONFIGURACIÓN Y ESTADO
// ═══════════════════════════════════════════════════════════
const token = new URLSearchParams(location.search).get('token') || localStorage.getItem('dvd_token');
if (!token) { alert('No token found'); location.href = '/'; }

const wsBase = location.protocol === 'https:' ? 'wss://' + location.host : 'ws://' + location.host;
let ws = null;
let gameState = null;
let myUsername = '';
let boardSize = 10;
let selectedShipType = null;
let orientation = 'H'; // H o V
let placedShips = {}; // {shipId: {type, cells: [[r,c],...], orientation}}
let selectedShipId = null; // Para mover/borrar
let shipConfig = {}; // {type: {size, count, remaining}}
let attackTarget = null; // {row, col} para el ataque seleccionado
let movingShip = false; // Modo de mover barco
let victoryShown = false; // Bandera para mostrar victoria solo una vez

// Audios
const sounds = {
  place: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz'),
  attack: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz'),
  hit: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz'),
  miss: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz'),
  sunk: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz'),
  victory: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz'),
  gameStart: new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDhkjwJE1y06+qnVRQLRp/g8r5sIQUrgs/y2Ik2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz')
};

// Videos de misiles (URLs de ejemplo - reemplazar con videos reales)
const videos = {
  miss: 'https://cdn.pixabay.com/video/2021/08/10/84820-588876526_large.mp4', // Agua/splash
  hit: 'https://cdn.pixabay.com/video/2020/06/11/41944-431237094_large.mp4', // Explosión
  sunk: 'https://cdn.pixabay.com/video/2019/09/04/26506-358770771_large.mp4' // Explosión grande
};

// ═══════════════════════════════════════════════════════════
// CONEXIÓN WEBSOCKET
// ═══════════════════════════════════════════════════════════
function connectWS() {
  ws = new WebSocket(wsBase + '/ws/hundirlaflota?token=' + encodeURIComponent(token));
  
  ws.onopen = () => {
    console.log('✓ WebSocket conectado');
    updateStatus('Conectado al servidor', 'ready');
  };
  
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleMessage(data);
    } catch(err) {
      console.error('❌ Error al procesar mensaje:', err);
    }
  };
  
  ws.onclose = () => {
    console.log('⚠️ WebSocket cerrado, reconectando...');
    updateStatus('Conexión perdida, reconectando...', 'error');
    setTimeout(connectWS, 3000);
  };
  
  ws.onerror = (err) => {
    console.error('❌ Error de WebSocket:', err);
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
    console.log('📤 Enviado:', data.action);
  } else {
    console.error('❌ WebSocket no está conectado');
    updateStatus('Error: No hay conexión con el servidor', 'error');
  }
}

// ═══════════════════════════════════════════════════════════
// MANEJO DE MENSAJES
// ═══════════════════════════════════════════════════════════
function handleMessage(data) {
  console.log('📨 Mensaje recibido:', data);
  
  if (data.type === 'state') {
    const previousPhase = gameState?.phase;
    gameState = data;
    myUsername = data.username || '';
    
    console.log('📊 Estado recibido - Fase:', data.phase, 'Jugadores:', data.players?.length);
    
    // Resetear bandera de victoria cuando cambia la fase
    if (previousPhase !== data.phase) {
      victoryShown = false;
      console.log('🔄 Fase cambió de', previousPhase, 'a', data.phase, '- Reseteando bandera de victoria');
    }
    
    // Obtener board_size y ship_config del setup
    if (data.setup) {
      boardSize = data.setup.board_size || 10;
      
      // Configuración de barcos desde setup.ships
      if (data.setup.ships) {
        // Inicializar shipConfig solo si está vacío o si cambió la configuración
        if (Object.keys(shipConfig).length === 0) {
          shipConfig = {};
          for (const [type, cfg] of Object.entries(data.setup.ships)) {
            shipConfig[type] = {
              size: cfg.size,
              count: cfg.count,
              remaining: cfg.count
            };
          }
          console.log('🚢 Configuración de barcos inicializada:', shipConfig);
        }
        
        // Sincronizar con barcos ya colocados del servidor
        // IMPORTANTE: Solo sincronizar MIS barcos, no los de otros jugadores
        const me = data.players?.find(p => p.username === myUsername);
        if (me && me.ships) {
          console.log('👤 Mi estado:', {
            username: myUsername,
            ready: me.ready,
            ships: Object.keys(me.ships).length,
            board: Object.keys(me.board || {}).length
          });
          
          // SOLO actualizar placedShips si estoy en fase de colocación o si mis barcos cambiaron
          const shouldUpdate = data.phase === 'placement' || Object.keys(placedShips).length === 0;
          
          if (shouldUpdate) {
            // Reconstruir placedShips desde el estado del servidor
            const newPlacedShips = {};
            
            for (const [shipId, shipData] of Object.entries(me.ships)) {
              if (shipData.placed && shipData.positions && shipData.positions.length > 0) {
                // Determinar orientación
                const positions = shipData.positions;
                const orientation = positions.length > 1 && positions[0][0] === positions[1][0] ? 'H' : 'V';
                
                newPlacedShips[shipId] = {
                  type: shipData.type,
                  cells: positions,
                  orientation: orientation
                };
              }
            }
            
            // Solo actualizar si hay cambios
            if (Object.keys(newPlacedShips).length > 0 || Object.keys(placedShips).length === 0) {
              placedShips = newPlacedShips;
              console.log('🚢 Barcos colocados sincronizados:', Object.keys(placedShips).length);
            }
          }
          
          // Actualizar contadores de barcos restantes
          for (const [type, cfg] of Object.entries(shipConfig)) {
            cfg.remaining = cfg.count;
          }
          
          // Decrementar por barcos ya colocados
          for (const ship of Object.values(placedShips)) {
            if (shipConfig[ship.type]) {
              shipConfig[ship.type].remaining--;
            }
          }
        }
        
        updateShipCounts();
      }
    }
    
    // Detectar cambio de fase a batalla
    if (previousPhase === 'placement' && data.phase === 'battle') {
      // ¡El juego ha comenzado!
      console.log('⚔️ ¡Iniciando batalla!');
      showGameStartAnimation();
      playSound('gameStart');
    }
    
    renderGame();
  }
  
  if (data.type === 'attack_result') {
    // TODOS LOS JUGADORES ven el resultado del ataque con animación y video
    const result = data.result;
    const attacker = data.attacker;
    const target = data.target;
    const coord = `Fila ${data.row + 1}, Columna ${data.col + 1}`;
    
    // Mostrar animación y video para TODOS
    if (result === 'hit') {
      playVideo('hit');
      playSound('hit');
    } else if (result === 'sunk') {
      playVideo('sunk');
      playSound('sunk');
    } else if (result === 'miss') {
      playVideo('miss');
      playSound('miss');
    }
    
    // Mensaje específico según rol
    if (attacker === myUsername) {
      // Mi ataque
      if (result === 'hit') {
        updateStatus(`🎯 ¡TOCADO! Has impactado un barco enemigo en ${coord}`, 'ready');
      } else if (result === 'sunk') {
        updateStatus(`💥 ¡HUNDIDO! Has destruido completamente un barco enemigo en ${coord}`, 'ready');
      } else if (result === 'miss') {
        updateStatus(`💨 AGUA. Tu ataque falló en ${coord}`, 'error');
      }
    } else if (target === myUsername) {
      // Ataque recibido
      if (result === 'hit') {
        updateStatus(`💥 ¡IMPACTO! El enemigo ha tocado tu barco en ${coord}`, 'error');
      } else if (result === 'sunk') {
        updateStatus(`🚢 ¡BARCO HUNDIDO! Han destruido uno de tus barcos en ${coord}`, 'error');
      } else if (result === 'miss') {
        updateStatus(`🌊 El enemigo falló su ataque en ${coord}`, '');
      }
    } else {
      // Espectador
      if (result === 'hit') {
        updateStatus(`🎯 ${attacker} impactó a ${target} en ${coord}`, '');
      } else if (result === 'sunk') {
        updateStatus(`💥 ${attacker} hundió un barco de ${target} en ${coord}`, '');
      } else if (result === 'miss') {
        updateStatus(`💨 ${attacker} falló el ataque a ${target} en ${coord}`, '');
      }
    }
    
    // Esperar a que termine el video antes de actualizar el estado
    setTimeout(() => {
      if (gameState) renderGame();
    }, 4500);
  }
  
  if (data.type === 'game_over') {
    // TODOS LOS JUGADORES ven la animación de victoria
    const winner = data.winner;
    if (!victoryShown) {
      victoryShown = true;
      console.log('🏆 Mostrando victoria para todos - Ganador:', winner);
      showVictoryAnimation(winner);
      playSound('victory');
    }
  }
  
  if (data.type === 'error') {
    updateStatus('❌ Error: ' + data.message, 'error');
    console.error('❌ Error del servidor:', data.message);
  }
}

// Sistema de confeti
let confettiInterval = null;
function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const confetti = [];
  const colors = ['#D4A843', '#F0C866', '#38B87A', '#4878D8', '#C83060', '#EAE6D8'];
  
  // Crear partículas de confeti
  for (let i = 0; i < 150; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 6 + 4,
      d: Math.random() * 10 + 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.random() * 10 - 10,
      tiltAngleIncremental: Math.random() * 0.07 + 0.05,
      tiltAngle: 0
    });
  }
  
  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    confetti.forEach((c, i) => {
      ctx.beginPath();
      ctx.lineWidth = c.r / 2;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x + c.tilt + c.r, c.y);
      ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r);
      ctx.stroke();
      
      // Actualizar posición
      c.tiltAngle += c.tiltAngleIncremental;
      c.y += (Math.cos(c.d) + 3 + c.r / 2) / 2;
      c.tilt = Math.sin(c.tiltAngle - i / 3) * 15;
      
      // Reiniciar si sale de la pantalla
      if (c.y > canvas.height) {
        confetti[i] = {
          x: Math.random() * canvas.width,
          y: -20,
          r: c.r,
          d: c.d,
          color: c.color,
          tilt: c.tilt,
          tiltAngleIncremental: c.tiltAngleIncremental,
          tiltAngle: c.tiltAngle
        };
      }
    });
  }
  
  confettiInterval = setInterval(drawConfetti, 33);
}

function stopConfetti() {
  if (confettiInterval) {
    clearInterval(confettiInterval);
    confettiInterval = null;
  }
}

function renderGame() {
  if (!gameState) return;
  
  const phase = gameState.phase || 'waiting';
  const me = gameState.players?.find(p => p.username === myUsername);
  const isGameMaster = me && me.is_admin;
  
  console.log('🎮 Renderizando juego - Fase:', phase, 'Usuario:', myUsername, 'Jugador encontrado:', me, 'Admin:', isGameMaster);
  
  // Si la fase es waiting y no soy admin, mostrar mensaje de espera
  if (phase === 'waiting' && !isGameMaster) {
    updateStatus('⏳ Esperando que el host inicie la partida...', '');
    document.getElementById('setupControls').style.display = 'none';
    document.getElementById('enemyPanel').style.display = 'none';
    return;
  }
  
  // Actualizar subtítulo
  document.getElementById('subtitle').textContent = 
    phase === 'placement' ? '📝 Fase de preparación — Coloca tus barcos' :
    phase === 'battle' ? '⚔️ Batalla en curso' :
    phase === 'finished' ? '🏆 Partida terminada' :
    isGameMaster ? '⚙️ Configura la partida desde el panel de administración' :
    '⏳ Esperando jugadores...';
  
  // Renderizar tablero propio
  renderBoard('myBoard', boardSize, true);
  
  // Mostrar/ocultar panel enemigo según fase
  const enemyPanel = document.getElementById('enemyPanel');
  const enemyPanelTitle = document.getElementById('enemyPanelTitle');
  
  if (phase === 'battle' || phase === 'finished') {
    enemyPanel.style.display = 'block';
    
    // Actualizar título según turno
    if (phase === 'battle' && gameState.current_turn === myUsername) {
      enemyPanelTitle.textContent = '🎯 Tablero de Ataque — ¡TU TURNO!';
      enemyPanelTitle.style.color = 'var(--gold2)';
    } else if (phase === 'battle') {
      enemyPanelTitle.textContent = '🎯 Tablero de Ataque — Esperando...';
      enemyPanelTitle.style.color = 'var(--blue)';
    } else {
      enemyPanelTitle.textContent = '🎯 Tablero de Ataque';
      enemyPanelTitle.style.color = 'var(--blue)';
    }
    
    renderBoard('enemyBoard', boardSize, false);
  } else {
    enemyPanel.style.display = 'none';
  }
  
  // Mostrar controles según fase
  const setupControls = document.getElementById('setupControls');
  if (phase === 'placement' && me && !me.ready) {
    setupControls.style.display = 'block';
    renderShipButtons();
  } else {
    setupControls.style.display = 'none';
  }
  
  // Renderizar lista de jugadores
  renderPlayers();
  
  // Actualizar estado
  if (phase === 'placement') {
    if (me && me.ready) {
      const readyCount = gameState.players.filter(p => p.ready).length;
      const totalCount = gameState.players.length;
      updateStatus(`✓ Configuración lista — Esperando jugadores (${readyCount}/${totalCount})`, 'ready');
    } else {
      updateStatus('📝 Coloca tus barcos en el tablero y pulsa Validar', '');
    }
  } else if (phase === 'battle') {
    const currentPlayer = gameState.current_turn;
    if (currentPlayer === myUsername) {
      updateStatus('🎯 ¡ES TU TURNO! Selecciona una casilla enemiga para atacar', 'ready');
    } else {
      updateStatus(`⏳ Turno de @${currentPlayer} — Espera tu turno...`, '');
    }
  } else if (phase === 'finished') {
    const winner = gameState.winner;
    if (winner === myUsername) {
      updateStatus('🏆 ¡VICTORIA! ¡Has ganado la batalla naval!', 'ready');
      // NO llamar a showVictoryAnimation aquí - solo se muestra cuando llega el mensaje game_over
    } else {
      updateStatus(`🏁 Fin de la partida — Ganador: @${winner}`, '');
    }
    
    // Mostrar botones de acción al final del juego
    const setupControls = document.getElementById('setupControls');
    setupControls.style.display = 'block';
    setupControls.innerHTML = `
      <div style="text-align:center;padding:20px;">
        <div style="font-size:1.2rem;color:var(--text);margin-bottom:20px;">
          ${winner === myUsername ? '🏆 ¡Victoria!' : '💀 Fin del juego'}
        </div>
        <div class="actionButtons">
          <button class="btn btnO" onclick="resetAndNewGame()">🔄 Nueva Partida</button>
          <button class="btn btnS" onclick="location.href="/bank/"">🏠 Volver al Inicio</button>
        </div>
      </div>
    `;
  } else if (phase === 'waiting') {
    if (isGameMaster) {
      updateStatus('⚙️ Configura la partida desde el panel de administración', '');
    } else {
      updateStatus('⏳ Esperando que comience la partida...', '');
    }
  }
}

function renderBoard(boardId, size, isMyBoard) {
  const board = document.getElementById(boardId);
  board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  board.innerHTML = '';
  
  const me = gameState?.players?.find(p => p.username === myUsername);
  
  // Mapa de posiciones de barcos para determinar proa/popa
  const shipPositions = new Map();
  
  if (isMyBoard) {
    // Mapear todas las posiciones de barcos
    for (const [shipId, ship] of Object.entries(placedShips)) {
      ship.cells.forEach((cell, idx) => {
        const key = `${cell[0]},${cell[1]}`;
        shipPositions.set(key, {
          shipId,
          orientation: ship.orientation,
          position: idx === 0 ? 'bow' : (idx === ship.cells.length - 1 ? 'stern' : 'middle'),
          total: ship.cells.length
        });
      });
    }
  }
  
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      
      if (isMyBoard) {
        // Mi tablero: mostrar barcos colocados y ataques recibidos
        const key = `${r},${c}`;
        const shipInfo = shipPositions.get(key);
        
        if (shipInfo) {
          cell.classList.add('ship');
          
          // Añadir clases para orientación y posición
          if (shipInfo.orientation === 'H') {
            cell.classList.add('horizontal');
            if (shipInfo.position === 'bow') cell.classList.add('bow-h');
            else if (shipInfo.position === 'stern') cell.classList.add('stern-h');
          } else {
            cell.classList.add('vertical');
            if (shipInfo.position === 'bow') cell.classList.add('bow-v');
            else if (shipInfo.position === 'stern') cell.classList.add('stern-v');
          }
          
          if (shipInfo.shipId === selectedShipId) {
            cell.classList.add('selected');
          }
        }
        
        // Mostrar ataques recibidos en mi tablero
        if (me && me.board) {
          const coord = `${r},${c}`;
          const cellData = me.board[coord];
          if (cellData) {
            if (cellData.hit) {
              cell.classList.add('hit');
            } else if (cellData.hit === false) {
              // Ataque fallido (miss) en mi tablero
              cell.classList.add('miss');
            }
          }
        }
        
        // Click para colocar/seleccionar barcos
        cell.addEventListener('click', () => handleMyBoardClick(r, c, shipInfo?.shipId));
      } else {
        // Tablero enemigo: mostrar solo mis ataques
        if (me && me.attacks) {
          const coord = `${r},${c}`;
          const attack = me.attacks[coord];
          if (attack) {
            if (attack.result === 'hit' || attack.result === 'sunk') {
              cell.classList.add('hit');
            } else if (attack.result === 'miss') {
              cell.classList.add('miss');
            }
          }
        }
        
        // Marcar celda seleccionada para atacar
        if (attackTarget && attackTarget.row === r && attackTarget.col === c) {
          cell.style.background = 'rgba(212,168,67,.3)';
          cell.style.borderColor = 'var(--gold)';
          cell.style.boxShadow = '0 0 15px rgba(212,168,67,.5)';
        }
        
        // Click para seleccionar objetivo de ataque
        cell.addEventListener('click', () => handleEnemyBoardClick(r, c));
      }
      
      board.appendChild(cell);
    }
  }
}

// ═══════════════════════════════════════════════════════════
// LÓGICA DE COLOCACIÓN DE BARCOS
// ═══════════════════════════════════════════════════════════
function selectShipType(type) {
  if (shipConfig[type].remaining === 0) return;
  selectedShipType = type;
  selectedShipId = null;
  movingShip = false;
  renderShipButtons();
  renderBoard('myBoard', boardSize, true);
}

function setOrientation(orient) {
  orientation = orient;
  document.getElementById('orientH').classList.toggle('active', orient === 'H');
  document.getElementById('orientV').classList.toggle('active', orient === 'V');
}

function handleMyBoardClick(r, c, shipId) {
  const phase = gameState?.phase;
  if (phase !== 'placement') return;
  
  // Si estamos en modo mover, colocar el barco en la nueva posición
  if (movingShip && selectedShipId) {
    const ship = placedShips[selectedShipId];
    if (ship) {
      // Intentar colocar en nueva posición
      const cfg = shipConfig[ship.type];
      const cells = [];
      
      for (let i = 0; i < cfg.size; i++) {
        const nr = orientation === 'H' ? r : r + i;
        const nc = orientation === 'H' ? c + i : c;
        
        // Verificar límites
        if (nr >= boardSize || nc >= boardSize) {
          updateStatus('❌ El barco no cabe en esa posición. Elige otra casilla.', 'error');
          return;
        }
        
        // Verificar colisiones (excepto con el mismo barco)
        const existingShipId = findShipAtCell(nr, nc);
        if (existingShipId && existingShipId !== selectedShipId) {
          updateStatus('❌ Ya hay un barco en esa posición. Elige otra casilla.', 'error');
          return;
        }
        
        cells.push([nr, nc]);
      }
      
      // Actualizar posición del barco
      ship.cells = cells;
      ship.orientation = orientation;
      
      movingShip = false;
      selectedShipId = null;
      updateStatus('✓ Barco reubicado correctamente', 'ready');
      renderBoard('myBoard', boardSize, true);
      renderShipButtons();
      return;
    }
  }
  
  // Si hay un barco en esta celda, seleccionarlo para mover/borrar
  if (shipId) {
    if (selectedShipId === shipId) {
      // Deseleccionar
      selectedShipId = null;
      movingShip = false;
    } else {
      // Seleccionar este barco
      selectedShipId = shipId;
      selectedShipType = null;
      movingShip = false;
      
      // Actualizar orientación según el barco seleccionado
      const ship = placedShips[shipId];
      if (ship) {
        setOrientation(ship.orientation);
      }
    }
    renderBoard('myBoard', boardSize, true);
    renderShipButtons();
    return;
  }
  
  // Si no hay barco seleccionado para colocar, no hacer nada
  if (!selectedShipType) return;
  
  // Intentar colocar el barco
  const cfg = shipConfig[selectedShipType];
  const cells = [];
  
  for (let i = 0; i < cfg.size; i++) {
    const nr = orientation === 'H' ? r : r + i;
    const nc = orientation === 'H' ? c + i : c;
    
    // Verificar límites
    if (nr >= boardSize || nc >= boardSize) {
      updateStatus('❌ El barco no cabe en esa posición. Elige otra casilla.', 'error');
      return;
    }
    
    // Verificar colisiones
    if (findShipAtCell(nr, nc)) {
      updateStatus('❌ Ya hay un barco en esa posición. Elige otra casilla.', 'error');
      return;
    }
    
    cells.push([nr, nc]);
  }
  
  // Colocar el barco
  const newShipId = Date.now() + '_' + selectedShipType;
  placedShips[newShipId] = {
    type: selectedShipType,
    cells: cells,
    orientation: orientation
  };
  
  // Decrementar contador
  shipConfig[selectedShipType].remaining--;
  updateShipCounts();
  
  // Reproducir sonido
  playSound('place');
  
  // Si no quedan más de este tipo, deseleccionar
  if (shipConfig[selectedShipType].remaining === 0) {
    selectedShipType = null;
  }
  
  updateStatus('✓ Barco colocado correctamente', 'ready');
  renderBoard('myBoard', boardSize, true);
  renderShipButtons();
  checkReadyButton();
}

function findShipAtCell(r, c) {
  for (const [shipId, ship] of Object.entries(placedShips)) {
    if (ship.cells.some(([sr, sc]) => sr === r && sc === c)) {
      return shipId;
    }
  }
  return null;
}

function clearSelected() {
  if (!selectedShipId) {
    updateStatus('❌ Primero selecciona un barco haciendo click sobre él', 'error');
    return;
  }
  
  const ship = placedShips[selectedShipId];
  if (ship) {
    // Devolver al contador
    shipConfig[ship.type].remaining++;
    delete placedShips[selectedShipId];
    selectedShipId = null;
    movingShip = false;
    updateShipCounts();
    updateStatus('✓ Barco eliminado correctamente', 'ready');
    renderBoard('myBoard', boardSize, true);
    renderShipButtons();
    checkReadyButton();
  }
}

function rotateSelected() {
  if (!selectedShipId) {
    updateStatus('❌ Primero selecciona un barco haciendo click sobre él', 'error');
    return;
  }
  
  const ship = placedShips[selectedShipId];
  if (!ship) return;
  
  // Cambiar orientación
  const newOrientation = ship.orientation === 'H' ? 'V' : 'H';
  const cfg = shipConfig[ship.type];
  
  // Obtener posición inicial (primera celda)
  const [startRow, startCol] = ship.cells[0];
  
  // Calcular nuevas celdas con la nueva orientación
  const newCells = [];
  for (let i = 0; i < cfg.size; i++) {
    const nr = newOrientation === 'H' ? startRow : startRow + i;
    const nc = newOrientation === 'H' ? startCol + i : startCol;
    
    // Verificar límites
    if (nr >= boardSize || nc >= boardSize) {
      updateStatus('❌ El barco no cabe en esa orientación. Muévelo primero.', 'error');
      return;
    }
    
    // Verificar colisiones (excepto con el mismo barco)
    const existingShipId = findShipAtCell(nr, nc);
    if (existingShipId && existingShipId !== selectedShipId) {
      updateStatus('❌ No se puede rotar, hay otro barco en el camino', 'error');
      return;
    }
    
    newCells.push([nr, nc]);
  }
  
  // Aplicar rotación
  ship.cells = newCells;
  ship.orientation = newOrientation;
  
  // Actualizar orientación en los controles
  setOrientation(newOrientation);
  
  updateStatus(`🔄 Barco rotado a ${newOrientation === 'H' ? 'horizontal' : 'vertical'}`, 'ready');
  renderBoard('myBoard', boardSize, true);
  renderShipButtons();
}

function clearAll() {
  if (!confirm('¿Estás seguro de que quieres eliminar todos los barcos?')) return;
  
  // Devolver todos al contador
  for (const ship of Object.values(placedShips)) {
    shipConfig[ship.type].remaining++;
  }
  
  placedShips = {};
  selectedShipId = null;
  selectedShipType = null;
  movingShip = false;
  updateShipCounts();
  updateStatus('✓ Todos los barcos han sido eliminados', 'ready');
  renderBoard('myBoard', boardSize, true);
  renderShipButtons();
  checkReadyButton();
}

function updateShipCounts() {
  // Actualizar el botón de listo
  checkReadyButton();
}

function checkReadyButton() {
  const allPlaced = Object.values(shipConfig).every(cfg => cfg.remaining === 0);
  document.getElementById('readyBtn').disabled = !allPlaced;
  
  if (allPlaced) {
    updateStatus('✅ Todos los barcos colocados — ¡Pulsa "Validar" para comenzar!', 'ready');
  }
}

function markReady() {
  // Verificar que todos los barcos estén colocados
  const allPlaced = Object.values(shipConfig).every(cfg => cfg.remaining === 0);
  if (!allPlaced) {
    updateStatus('❌ Debes colocar todos los barcos antes de validar', 'error');
    return;
  }
  
  // Convertir placedShips al formato esperado por el servidor
  const ships = {};
  for (const [shipId, ship] of Object.entries(placedShips)) {
    ships[shipId] = {
      type: ship.type,
      cells: ship.cells,
      orientation: ship.orientation
    };
  }
  
  console.log('📤 Enviando configuración de barcos:', ships);
  console.log('📊 Total de barcos:', Object.keys(ships).length);
  
  // Verificar conexión antes de enviar
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    updateStatus('❌ Error: No hay conexión con el servidor. Reconectando...', 'error');
    connectWS();
    return;
  }
  
  send({
    action: 'place_ships',
    ships: ships
  });
  
  updateStatus('⏳ Enviando configuración al servidor...', '');
  
  // Deshabilitar controles inmediatamente
  document.getElementById('setupControls').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════
// LÓGICA DE ATAQUE
// ═══════════════════════════════════════════════════════════
function handleEnemyBoardClick(r, c) {
  const phase = gameState?.phase;
  if (phase !== 'battle') return;
  
  if (gameState.current_turn !== myUsername) {
    updateStatus('❌ No es tu turno. Espera a que el enemigo ataque.', 'error');
    return;
  }
  
  const me = gameState.players?.find(p => p.username === myUsername);
  if (!me) return;
  
  // Verificar si ya se atacó esta posición
  const coord = `${r},${c}`;
  if (me.attacks && me.attacks[coord]) {
    updateStatus('❌ Ya has atacado esta posición. Elige otra casilla.', 'error');
    return;
  }
  
  // Seleccionar objetivo
  attackTarget = { row: r, col: c };
  document.getElementById('attackBtn').disabled = false;
  updateStatus(`🎯 Objetivo seleccionado: Fila ${r+1}, Columna ${c+1} — Pulsa "Atacar" para confirmar`, 'ready');
  renderBoard('enemyBoard', boardSize, false);
}

function executeAttack() {
  if (!attackTarget) {
    updateStatus('❌ Primero selecciona una casilla para atacar', 'error');
    return;
  }
  
  console.log('💣 Ejecutando ataque en:', attackTarget);
  
  // Reproducir sonido de ataque
  playSound('attack');
  
  send({
    action: 'attack',
    row: attackTarget.row,
    col: attackTarget.col
  });
  
  document.getElementById('attackBtn').disabled = true;
  attackTarget = null;
  updateStatus('💣 Lanzando ataque...', '');
  renderBoard('enemyBoard', boardSize, false);
}

// ═══════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════
function updateStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

async function resetAndNewGame() {
  // Ocultar modal de victoria inmediatamente
  const victoryModal = document.getElementById('victoryModal');
  if (victoryModal) {
    victoryModal.style.display = 'none';
  }
  
  // Detener confeti
  stopConfetti();
  
  // Mostrar mensaje de carga
  updateStatus('🔄 Reiniciando juego...', '');
  
  try {
    // Paso 1: Desactivar el juego primero
    const toggleResponse = await fetch(\'/bank/api/hundirlaflota/toggle\', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ enabled: false })
    });
    
    if (!toggleResponse.ok) {
      console.warn('Error al desactivar el juego, continuando...');
    }
    
    // Paso 2: Resetear el estado del servidor
    const response = await fetch(\'/bank/api/hundirlaflota/reset\', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      }
    });
    
    if (!response.ok) {
      console.warn('Error al resetear el juego, continuando...');
    }
    
    updateStatus('✓ Juego reiniciado — Recargando...', 'ready');
    
    // Limpiar estado local
    gameState = null;
    placedShips = {};
    selectedShipType = null;
    selectedShipId = null;
    attackTarget = null;
    victoryShown = false;
    
    // Cerrar WebSocket si está abierto
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    }
    
    // Esperar un momento y recargar la página para estado completamente limpio
    setTimeout(() => {
      location.reload();
    }, 1000);
    
  } catch (error) {
    console.error('Error al reiniciar:', error);
    updateStatus('❌ Error al reiniciar el juego. Recargando página...', 'error');
    
    // Recargar de todas formas después de un breve delay
    setTimeout(() => {
      location.reload();
    }, 1500);
  }
}

// Limpiar cualquier estado previo al cargar la página
window.addEventListener('load', () => {
  // Ocultar modal de victoria si está visible
  const victoryModal = document.getElementById('victoryModal');
  if (victoryModal) {
    victoryModal.style.display = 'none';
  }
  
  // Detener confeti si está activo
  stopConfetti();
  
  // Limpiar localStorage relacionado con el juego si existe
  const keysToRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.includes('hundirlaflota')) {
      keysToRemove.push(key);
    }
  }
  keysToRemove.forEach(key => localStorage.removeItem(key));
  
  console.log('🔄 Estado local limpiado - Iniciando desde 0');
});
