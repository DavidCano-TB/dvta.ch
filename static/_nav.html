<style>
/* Navegación unificada */
.unified-nav {
  position: sticky;
  top: 0;
  z-index: 99;
  background: rgba(4,4,10,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,168,67,.13);
}
.unified-nav::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg,transparent,rgba(139,96,16,.5) 30%,rgba(212,168,67,1) 50%,rgba(139,96,16,.5) 70%,transparent);
}
.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px;
}
.nav-tabs {
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  gap: 4px;
  padding: 8px 0;
}
.nav-tabs::-webkit-scrollbar {
  display: none;
}
.nav-tab {
  padding: 8px 16px;
  background: none;
  border: none;
  color: rgba(234,230,216,.5);
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  cursor: pointer;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: all .2s;
  position: relative;
  white-space: nowrap;
  flex-shrink: 0;
  border-radius: 8px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.nav-tab:hover {
  color: rgba(240,200,102,1);
  background: rgba(212,168,67,.08);
}
.nav-tab.active {
  color: rgba(240,200,102,1);
  background: rgba(212,168,67,.12);
  border-bottom: 2px solid rgba(212,168,67,1);
}
.nav-tab .icon {
  font-size: 1rem;
}
/* Mobile bottom nav */
@media (max-width: 768px) {
  .nav-tabs {
    justify-content: flex-start;
  }
  .nav-tab {
    font-size: .62rem;
    padding: 6px 12px;
  }
}
</style>

<nav class="unified-nav">

<script>
(function() {
  'use strict';
  
  // Detectar página actual y marcar pestaña activa
  function setActiveTab() {
    const path = window.location.pathname;
    const hash = window.location.hash;
    const tabs = document.querySelectorAll('.nav-tab');
    
    tabs.forEach(tab => {
      tab.classList.remove('active');
      const page = tab.getAttribute('data-page');
      
      // Lógica de activación según la página
      if (path === '/' && !hash && page === 'home') {
        tab.classList.add('active');
      } else if (hash === '#transfer' && page === 'transfer') {
        tab.classList.add('active');
      } else if (hash === '#history' && page === 'history') {
        tab.classList.add('active');
      } else if (hash === '#gallery' && page === 'gallery') {
        tab.classList.add('active');
      } else if (path.includes(page)) {
        tab.classList.add('active');
      }
    });
  }
  
  // Verificar si el usuario es admin (no-op, admin tab removed)
  function checkAdminAccess() {}
  
  // Inicializar
  setActiveTab();
  
  // Actualizar al cambiar hash
  window.addEventListener('hashchange', setActiveTab);
})();
</script>
