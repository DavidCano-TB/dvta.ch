<!-- ══════════════════════════════════════════════════════════
   NAVEGACIÓN UNIFICADA DVDCOIN BANK
   Incluir en todas las páginas HTML del frontend
══════════════════════════════════════════════════════════ -->
<style>
/* Navegación unificada */
.unified-nav {
  position: sticky;
  top: 0;
  z-index: 99;
  background: rgba(4,4,10,.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,168,67,.13);
}
.unified-nav::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg,transparent,rgba(139,96,16,.5) 30%,rgba(212,168,67,1) 50%,rgba(139,96,16,.5) 70%,transparent);
}
.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px;
}
.nav-tabs {
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  gap: 4px;
  padding: 8px 0;
}
.nav-tabs::-webkit-scrollbar {
  display: none;
}
.nav-tab {
  padding: 8px 16px;
  background: none;
  border: none;
  color: rgba(234,230,216,.5);
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  cursor: pointer;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: all .2s;
  position: relative;
  white-space: nowrap;
  flex-shrink: 0;
  border-radius: 8px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.nav-tab:hover {
  color: rgba(240,200,102,1);
  background: rgba(212,168,67,.08);
}
.nav-tab.active {
  color: rgba(240,200,102,1);
  background: rgba(212,168,67,.12);
  border-bottom: 2px solid rgba(212,168,67,1);
}
.nav-tab .icon {
  font-size: 1rem;
}
/* Mobile bottom nav */
@media (max-width: 768px) {
  .nav-tabs {
    justify-content: flex-start;
  }
  .nav-tab {
    font-size: .62rem;
    padding: 6px 12px;
  }
}
</style>

<nav class="unified-nav">
  <div class="nav-container">
    <div class="nav-tabs" id="unifiedNavTabs">
      <!-- Inicio / Dashboard -->
      <a href="/" class="nav-tab" data-page="home">
        <span class="icon">🏦</span>
        <span>Inicio</span>
      </a>
      
      <!-- Transferencias -->
      <a href="/#transfer" class="nav-tab" data-page="transfer">

      </a>
      
      <!-- Historial -->
      <a href="/#history" class="nav-tab" data-page="history">
        <span class="icon">📜</span>
        <span>Historial</span>
      </a>
      
      <!-- Galería -->
      <a href="/#gallery" class="nav-tab" data-page="gallery">
        <span class="icon">🖼️</span>
        <span>Galería</span>
      </a>
      
      <!-- Cuentos -->
      <a href="/cuentos.html" class="nav-tab" data-page="cuentos">
        <span class="icon">📖</span>
        <span>Cuentos</span>
      </a>
      
      <!-- Mensajes -->
      <a href="/chat.html" class="nav-tab" data-page="chat">
        <span class="icon">💬</span>
        <span>Mensajes</span>
      </a>
      
      <!-- Videollamadas -->
      <a href="/video.html" class="nav-tab" data-page="video">
        <span class="icon">🎥</span>

      </a>
      
      <!-- Juegos -->
      <a href="/pasapalabra.html" class="nav-tab" data-page="pasapalabra">

        <span>Pasapalabra</span>
      </a>
      
      <a href="/millonario.html" class="nav-tab" data-page="millonario">
        <span class="icon">💰</span>
        <span>Millonario</span>
      </a>
      
      <a href="/quiensoy.html" class="nav-tab" data-page="quiensoy">
        <span class="icon">🎭</span>
        <span>¿Quién soy?</span>
      </a>
      
      <a href="/cifrasletras.html" class="nav-tab" data-page="cifrasletras">
        <span class="icon">🔤</span>
        <span>Cifras y Letras</span>
      </a>
      
      <!-- Apuestas -->
      <a href="/apuestas.html" class="nav-tab" data-page="apuestas">
        <span class="icon">🎲</span>
        <span>Apuestas</span>
      </a>
      
      <!-- Votaciones -->

      <!-- Stats -->
      <a href="/stats" class="nav-tab" data-page="stats">

        <span>Estadísticas</span>
      </a>
      
      <!-- Admin (solo visible para admins) -->
      <a href="/#admin" class="nav-tab" data-page="admin" id="navAdmin" style="display:none">
        <span class="icon">⚙️</span>
        <span>Admin</span>
      </a>
    </div>
  </div>
</nav>

<script>
(function() {
  'use strict';
  
  // Detectar página actual y marcar pestaña activa
  function setActiveTab() {
    const path = window.location.pathname;
    const hash = window.location.hash;
    const tabs = document.querySelectorAll('.nav-tab');
    
    tabs.forEach(tab => {
      tab.classList.remove('active');
      const page = tab.getAttribute('data-page');
      
      // Lógica de activación según la página
      if (path === '/' && !hash && page === 'home') {
        tab.classList.add('active');
      } else if (hash === '#transfer' && page === 'transfer') {
        tab.classList.add('active');
      } else if (hash === '#history' && page === 'history') {
        tab.classList.add('active');
      } else if (hash === '#gallery' && page === 'gallery') {
        tab.classList.add('active');
      } else if (hash === '#admin' && page === 'admin') {
        tab.classList.add('active');
      } else if (path.includes(page)) {
        tab.classList.add('active');
      }
    });
  }
  
  // Verificar si el usuario es admin para mostrar pestaña admin
  function checkAdminAccess() {
    const token = localStorage.getItem('dvd_token');
    if (!token) return;
    
    fetch('/api/me', {
      headers: {
        'Authorization': 'Bearer ' + token,
        'ngrok-skip-browser-warning': '1'
      }
    })
    .then(r => r.json())
    .then(user => {
      if (user.is_admin) {
        document.getElementById('navAdmin').style.display = '';
      }
    })
    .catch(() => {});
  }
  
  // Inicializar
  setActiveTab();
  checkAdminAccess();
  
  // Actualizar al cambiar hash
  window.addEventListener('hashchange', setActiveTab);
})();
</script>
