<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04040A">
<title>Admin — Mensajes</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/bank/static/admin/_base.css">
<link rel="stylesheet" href="/bank/static/css/unified-nav.css">
<style>
/* ── NAVEGACIÓN UNIFICADA ─────────────────────────────── */
.unified-nav {
  position: sticky; top: 0; z-index: 101;
  background: rgba(4,4,10,.97); backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(212,168,67,.14);
}
.unified-nav::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,transparent,rgba(139,96,16,.5) 30%,rgba(212,168,67,1) 50%,rgba(139,96,16,.5) 70%,transparent);
}
.nav-tabs {
  display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 2px; padding: 6px 12px;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 6px 12px; background: none; border: none;
  color: var(--text3); font-family: 'DM Mono', monospace;
  font-size: .62rem; cursor: pointer; letter-spacing: .06em;
  text-transform: uppercase; transition: all .2s; position: relative;
  white-space: nowrap; flex-shrink: 0; border-radius: 6px;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.nav-tab:hover { color: var(--gold2); background: rgba(212,168,67,.08); }
.nav-tab.active { color: var(--gold2); background: rgba(212,168,67,.12); border-bottom: 2px solid var(--gold); }
.nav-tab span { font-size: .9rem; }

.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.statCard{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:var(--r);
  padding:10px 14px;text-align:center}
.statVal{font-family:'Oswald',sans-serif;font-size:1.4rem;color:var(--gold2);line-height:1}
.statLabel{font-size:.52rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.msgPreview{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:.64rem;align-items:flex-start}
.msgPreview:last-child{border-bottom:none}
.mpWho{color:var(--gold3);min-width:70px;flex-shrink:0;padding-top:1px}
.mpContent{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mpType{font-size:.52rem;color:var(--blue);flex-shrink:0}
.mpTime{font-size:.52rem;color:var(--text3);flex-shrink:0;white-space:nowrap}
.onlineDot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle}
</style>
</head>
<body class="has-unified-nav">
<!-- Navegación Unificada -->
<div id="unifiedNavContainer"></div>

  <span class="badge off" id="badge">—</span>
</div>

<div class="wrap">

  <!-- Status -->
  <div class="section">
    <div class="sTitle">Estado del sistema</div>
    <div class="statusRow">
      <div class="statusDot off" id="dot"></div>
      <div class="statusText"><strong id="statusText">Cargando…</strong></div>
      <span id="onlineCount" style="font-size:.6rem;color:var(--green)"></span>
    </div>
    <div class="btnRow">
      <button class="btn btnG btnSm" id="btnOn"   onclick="toggle(true)"  style="display:none">▶ Activar mensajería</button>
      <button class="btn btnR btnSm" id="btnOff"  onclick="toggle(false)" style="display:none">■ Desactivar</button>
      <button class="btn btnS btnSm" id="btnOpen" onclick="openChat()"    style="display:none">↗ Abrir chat</button>
    </div>
    <div class="alert" id="alert1"></div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="sTitle">📊 Estadísticas</div>
    <div class="statGrid">
      <div class="statCard"><div class="statVal" id="statTotal">—</div><div class="statLabel">Mensajes totales</div></div>
      <div class="statCard"><div class="statVal" id="statToday">—</div><div class="statLabel">Hoy</div></div>
      <div class="statCard"><div class="statVal" id="statUsers">—</div><div class="statLabel">Usuarios activos</div></div>
      <div class="statCard"><div class="statVal" id="statRooms">—</div><div class="statLabel">Conversaciones</div></div>
    </div>
    <button class="btn btnS btnSm" onclick="loadStats()" style="margin-top:10px;width:100%">↻ Actualizar</button>
  </div>

  <!-- Recent messages -->
  <div class="section">
    <div class="sTitle">🕐 Mensajes recientes</div>
    <div id="recentList">
      <div style="font-size:.67rem;color:var(--text3);text-align:center;padding:12px">Cargando…</div>
    </div>
  </div>

</div>

<script>
'use strict';
const token = localStorage.getItem('dvd_token');
let enabled = false;

async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+token,'ngrok-skip-browser-warning':'1'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) { const d = await r.json().catch(()=>{}); throw new Error(d?.detail || 'Error '+r.status); }
  return r.json();
}

function showAlert(id, msg, type='err') {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert on ' + type;
  setTimeout(() => { el.className = 'alert'; }, 4000);
}

async function load() {
  if (!token) { location.href = '/'; return; }
  try {
    const status = await api('GET', '/bank/api/messages/status');
    enabled = !!status.enabled;
    updateStatus(status.online || []);
    await loadStats();
  } catch(e) { showAlert('alert1', e.message); }
}

function updateStatus(online) {
  document.getElementById('dot').className = 'statusDot ' + (enabled ? 'on' : 'off');
  document.getElementById('badge').textContent = enabled ? '🟢 Activo' : '⚫ Desactivado';
  document.getElementById('badge').className = 'badge ' + (enabled ? 'on' : 'off');
  document.getElementById('statusText').textContent = enabled ? 'Mensajería activa' : 'Mensajería desactivada';
  document.getElementById('btnOn').style.display   = enabled ? 'none' : '';
  document.getElementById('btnOff').style.display  = enabled ? '' : 'none';
  document.getElementById('btnOpen').style.display = enabled ? '' : 'none';
  const n = (online || []).length;
  document.getElementById('onlineCount').textContent = n > 0 ? `${n} en línea` : '';
}

async function toggle(on) {
  try {
    await api('POST', '/bank/api/messages/toggle', { enabled: on });
    enabled = on;
    updateStatus([]);
    showAlert('alert1', on ? '✓ Mensajería activada' : 'Mensajería desactivada', 'ok');
    if (on) await loadStats();
  } catch(e) { showAlert('alert1', e.message); }
}

function openChat() {
  window.open('/messages?token=' + encodeURIComponent(token), '_blank');
}

async function loadStats() {
  try {
    const d = await api('GET', '/bank/api/messages/admin/stats');
    document.getElementById('statTotal').textContent = d.total_messages ?? 0;
    document.getElementById('statToday').textContent = d.messages_today ?? 0;
    document.getElementById('statUsers').textContent = d.unique_senders ?? 0;
    document.getElementById('statRooms').textContent = d.total_rooms ?? 0;
    if (d.online_now != null) {
      document.getElementById('onlineCount').textContent = d.online_now > 0 ? `${d.online_now} en línea` : '';
    }
    renderRecent(d.recent || []);
  } catch(e) {
    document.getElementById('recentList').innerHTML =
      '<div style="font-size:.67rem;color:var(--text3);text-align:center;padding:12px">Sin datos aún</div>';
  }
}

function renderRecent(msgs) {
  const el = document.getElementById('recentList');
  if (!msgs.length) {
    el.innerHTML = '<div style="font-size:.67rem;color:var(--text3);text-align:center;padding:12px">Sin mensajes aún</div>';
    return;
  }
  el.innerHTML = msgs.map(m => {
    const isAudio = m.msg_type === 'audio';
    const preview = isAudio ? '🎤 Nota de voz' : esc(m.content || '').slice(0, 60);
    const time = fmtTime(m.created_at);
    return `<div class="msgPreview">
      <span class="mpWho">@${esc(m.from_user)}</span>
      <span class="mpContent">${preview}</span>
      ${isAudio ? '<span class="mpType">audio</span>' : ''}
      <span class="mpTime">${time}</span>
    </div>`;
  }).join('');
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date((iso.includes('T') ? iso : iso.replace(' ','T')) + 'Z');
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',hour12:false});
    return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}) + ' ' +
      d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',hour12:false});
  } catch { return iso.slice(11,16); }
}

function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load();
</script>

<!-- Sistema de Navegación Unificada -->
<script src="/bank/static/js/unified-nav.js"></script>

</body>
</html>
