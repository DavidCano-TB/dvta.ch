<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEBUG OPO</title>
<style>
body{font-family:monospace;padding:20px;background:#000;color:#0f0}
.log{margin:5px 0;padding:5px;border-left:3px solid #0f0}
.err{color:#f00;border-left-color:#f00}
.warn{color:#ff0;border-left-color:#ff0}
pre{background:#111;padding:10px;overflow-x:auto}
</style>
</head>
<body>
<h1>🔍 DEBUG OPO - DIAGNÓSTICO COMPLETO</h1>
<div id="logs"></div>

<script>
const logs = document.getElementById('logs');
function log(msg, type='ok') {
  const div = document.createElement('div');
  div.className = 'log ' + (type === 'err' ? 'err' : type === 'warn' ? 'warn' : '');
  div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
  logs.appendChild(div);
  console.log(msg);
}

async function debug() {
  log('=== INICIANDO DIAGNÓSTICO ===');
  
  // 1. Verificar token
  const token = localStorage.getItem('dvd_token');
  if (!token) {
    log('✗ NO HAY TOKEN - Necesitas loguearte primero', 'err');
    log('Ve a http://localhost:8000 y loguéate', 'warn');
    return;
  }
  log('✓ Token presente');
  
  // 2. Verificar usuario
  try {
    const r = await fetch('/api/me', {
      headers: {
        'Authorization': 'Bearer ' + token,
        'ngrok-skip-browser-warning': '1'
      }
    });
    if (!r.ok) {
      log('✗ Token inválido o expirado', 'err');
      return;
    }
    const me = await r.json();
    log('✓ Usuario: ' + me.username);
    
    // 3. Conectar WebSocket
    log('Conectando WebSocket...');
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws/opo?token=${encodeURIComponent(token)}`);
    
    ws.onopen = () => {
      log('✓ WebSocket conectado');
    };
    
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      log('✓ Mensaje recibido');
      
      const pre = document.createElement('pre');
      pre.textContent = JSON.stringify(data, null, 2);
      logs.appendChild(pre);
      
      // VERIFICAR PROBLEMA
      if (data.total_blocks === 0) {
        log('✗✗✗ PROBLEMA ENCONTRADO: total_blocks = 0', 'err');
        log('El backend NO está cargando las preguntas', 'err');
      } else {
        log(`✓ total_blocks = ${data.total_blocks}`, 'ok');
      }
      
      if (data.phase === 'waiting') {
        log('✓ Fase correcta: waiting');
        log('El frontend debería mostrar los bloques ahora');
      }
    };
    
    ws.onerror = (e) => {
      log('✗ Error WebSocket', 'err');
      console.error(e);
    };
    
    ws.onclose = (e) => {
      log(`✗ WebSocket cerrado: code=${e.code}, reason=${e.reason}`, 'err');
      if (e.code === 4003) {
        log('Sin acceso OPO - Tu usuario no está en opo_players', 'err');
      }
    };
    
  } catch (e) {
    log('✗ Error: ' + e.message, 'err');
    console.error(e);
  }
}

// Auto-ejecutar
debug();
</script>
</body>
</html>
