# Configuracion de Cloudflare Tunnel para DVDcoin
# Dominios: dvdbank.david.ch, dvdbank.ch, localhost
tunnel: 6c0cb6da-aafe-4e61-89aa-42d9bd2e5b33
credentials-file: credentials/6c0cb6da-aafe-4e61-89aa-42d9bd2e5b33.json

ingress:
  # Dominio principal: dvdbank.david.ch (FUNCIONA YA)
  - hostname: dvdbank.david.ch
    service: http://127.0.0.1:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 60s
      tlsTimeout: 20s
      tcpKeepAlive: 60s
      keepAliveConnections: 1024
      keepAliveTimeout: 120s
      httpHostHeader: dvdbank.david.ch
      disableChunkedEncoding: false
      proxyType: http
  
  # Dominio dvdbank.ch (cuando esté listo en Cloudflare)
  - hostname: dvdbank.ch
    service: http://127.0.0.1:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 60s
      tlsTimeout: 20s
      tcpKeepAlive: 60s
      keepAliveConnections: 1024
      keepAliveTimeout: 120s
      httpHostHeader: dvdbank.ch
      disableChunkedEncoding: false
      proxyType: http
  
  # Subdominio www.dvdbank.ch (cuando esté listo)
  - hostname: www.dvdbank.ch
    service: http://127.0.0.1:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 60s
      tlsTimeout: 20s
      tcpKeepAlive: 60s
      keepAliveConnections: 1024
      keepAliveTimeout: 120s
      httpHostHeader: www.dvdbank.ch
      disableChunkedEncoding: false
      proxyType: http
  
  # Respaldo: app.david.ch
  - hostname: app.david.ch
    service: http://127.0.0.1:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 60s
      tlsTimeout: 20s
      tcpKeepAlive: 60s
      keepAliveConnections: 1024
      keepAliveTimeout: 120s
      httpHostHeader: app.david.ch
      disableChunkedEncoding: false
      proxyType: http
  
  # Respaldo: localhost.david.ch
  - hostname: localhost.david.ch
    service: http://127.0.0.1:8000
    originRequest:
      noTLSVerify: true
      connectTimeout: 60s
      tlsTimeout: 20s
      tcpKeepAlive: 60s
      keepAliveConnections: 1024
      keepAliveTimeout: 120s
      httpHostHeader: localhost.david.ch
      disableChunkedEncoding: false
      proxyType: http
  
  # Catch-all para cualquier otro tráfico
  - service: http_status:404

# Metricas y configuracion avanzada
metrics: 127.0.0.1:2000
loglevel: info
protocol: quic
retries: 5
grace-period: 30s
no-autoupdate: false
