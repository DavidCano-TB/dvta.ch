<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04040A">
<title>Admin — Cuentos</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/admin/_base.css">
<link rel="stylesheet" href="/static/css/unified-nav.css">
<style>
.fileList{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;margin-top:10px}
.fileRow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);
  border:1px solid var(--b1);border-radius:var(--r);padding:9px 12px}
.fileTitle{flex:1;font-size:.72rem;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fileDate{font-size:.57rem;color:var(--text3);flex-shrink:0}
.maskedBadge{font-size:.52rem;color:var(--orange);background:rgba(232,130,12,.1);
  border:1px solid rgba(232,130,12,.25);border-radius:8px;padding:2px 7px;flex-shrink:0}
.uploadArea{border:2px dashed var(--b2);border-radius:var(--rL);padding:22px;
  text-align:center;cursor:pointer;transition:.18s;position:relative}
.uploadArea:hover{border-color:var(--gold);background:rgba(212,168,67,.03)}
.uploadArea input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uploadIcon{font-size:2rem;margin-bottom:6px}
.uploadLabel{font-size:.68rem;color:var(--text2)}
.uploadSub{font-size:.57rem;color:var(--text3);margin-top:4px}
</style>
</head>
<body class="has-unified-nav">
<!-- Navegación Unificada -->
<div id="unifiedNavContainer"></div>

  <span class="badge off" id="badge">—</span>
</div>

<div class="wrap">

  <!-- Visibility toggle -->
  <div class="section">
    <div class="sTitle">Visibilidad para miembros</div>
    <div class="statusRow">
      <div class="statusDot off" id="dot"></div>
      <div class="statusText"><strong id="statusText">Cargando…</strong></div>
    </div>
    <div class="btnRow">
      <button class="btn btnG btnSm" id="btnOn"  onclick="toggle(true)"  style="display:none">👁 Mostrar a miembros</button>
      <button class="btn btnR btnSm" id="btnOff" onclick="toggle(false)" style="display:none">🚫 Ocultar</button>
      <a class="btn btnS btnSm" href="/cuentos" target="_blank">↗ Ver como miembro</a>
    </div>
    <div class="alert" id="alert1"></div>
  </div>

  <!-- Upload -->
  <div class="section">
    <div class="sTitle">📤 Subir nuevo cuento</div>
    <div class="uploadArea" id="uploadArea">
      <input type="file" accept=".docx,.odt" id="fileInput" onchange="uploadFile(this.files[0])">
      <div class="uploadIcon">📄</div>
      <div class="uploadLabel">Arrastra un archivo o toca para elegir</div>
      <div class="uploadSub">Formatos: .docx · .odt — Máx 20 MB</div>
    </div>
    <div class="alert" id="alertUpload" style="margin-top:8px"></div>
  </div>

  <!-- File list -->
  <div class="section">
    <div class="sTitle">📚 Cuentos disponibles (<span id="fileCount">0</span>)</div>
    <div class="fileList" id="fileList">
      <div style="font-size:.68rem;color:var(--text3);text-align:center;padding:16px">Cargando…</div>
    </div>
    <div class="alert" id="alertFile" style="margin-top:8px"></div>
  </div>

</div>

<script>
'use strict';
const token = localStorage.getItem('dvd_token');
let enabled = false;

async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+token,'ngrok-skip-browser-warning':'1'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) { const d = await r.json().catch(()=>{}); throw new Error(d?.detail || 'Error '+r.status); }
  return r.json();
}

function showAlert(id, msg, type='err') {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert on ' + type;
  setTimeout(() => { el.className = 'alert'; }, 4000);
}

async function load() {
  if (!token) { location.href = '/'; return; }
  // Verify admin role before showing any content
  try {
    const me = await api('GET', '/api/me');
    if (!me.is_admin) { location.href = '/'; return; }
  } catch { location.href = '/'; return; }
  try {
    const [status, files] = await Promise.all([
      api('GET', '/api/cuentos/status'),
      api('GET', '/api/cuentos'),
    ]);
    enabled = !!status.enabled;
    updateStatus();
    renderFiles(files);
  } catch(e) { showAlert('alert1', e.message); }
}

function updateStatus() {
  document.getElementById('dot').className = 'statusDot ' + (enabled ? 'on' : 'off');
  document.getElementById('badge').textContent = enabled ? '🟢 Visible' : '⚫ Oculto';
  document.getElementById('badge').className = 'badge ' + (enabled ? 'on' : 'off');
  document.getElementById('statusText').textContent = enabled
    ? 'Cuentos visibles para todos los miembros'
    : 'Cuentos ocultos — solo admins pueden ver';
  document.getElementById('btnOn').style.display  = enabled ? 'none' : '';
  document.getElementById('btnOff').style.display = enabled ? '' : 'none';
}

async function toggle(on) {
  try {
    await api('POST', '/api/cuentos/toggle');
    enabled = on;
    updateStatus();
    showAlert('alert1', on ? '✓ Cuentos ahora visibles para miembros' : 'Cuentos ocultados', 'ok');
  } catch(e) { showAlert('alert1', e.message); }
}

function renderFiles(files) {
  const el = document.getElementById('fileList');
  document.getElementById('fileCount').textContent = files.length;
  if (!files.length) {
    el.innerHTML = '<div style="font-size:.68rem;color:var(--text3);text-align:center;padding:16px">Sin cuentos. Sube el primero ↑</div>';
    return;
  }
  el.innerHTML = files.map(f => `
    <div class="fileRow" id="fr-${esc(f.filename)}">
      <a class="fileTitle" title="Leer: ${esc(f.filename)}" href="/cuento/${encodeURIComponent(f.filename)}"
        style="color:var(--text);text-decoration:none;cursor:pointer" onmouseover="this.style.color='var(--gold2)'" onmouseout="this.style.color='var(--text)'"
      >📖 ${esc(f.title || f.filename)}</a>
      ${f.date ? `<div class="fileDate">${esc(f.date)}</div>` : ''}
      ${f.masked ? '<span class="maskedBadge">Oculto</span>' : ''}
      <button class="btn btnS btnSm" style="min-height:32px;padding:4px 10px;font-size:.58rem"
        onclick="toggleMask('${esc(f.filename)}', ${!f.masked})">
        ${f.masked ? '👁 Mostrar' : '🚫 Ocultar'}
      </button>
      <button class="btn btnR btnSm" style="min-height:32px;padding:4px 10px;font-size:.58rem"
        onclick="deleteFile('${esc(f.filename)}')">🗑</button>
    </div>`).join('');
}

async function toggleMask(filename, hide) {
  try {
    const ep = hide ? '/api/cuentos/mask/' : '/api/cuentos/unmask/';
    await api('POST', ep + encodeURIComponent(filename));
    const [status, files] = await Promise.all([api('GET','/api/cuentos/status'), api('GET','/api/cuentos')]);
    renderFiles(files);
    showAlert('alertFile', hide ? 'Cuento ocultado' : 'Cuento visible', 'ok');
  } catch(e) { showAlert('alertFile', e.message); }
}

async function deleteFile(filename) {
  if (!confirm('¿Eliminar "' + filename + '"? Esta acción no se puede deshacer.')) return;
  try {
    await api('DELETE', '/api/cuentos/file/' + encodeURIComponent(filename));
    const files = await api('GET', '/api/cuentos');
    renderFiles(files);
    showAlert('alertFile', '✓ Cuento eliminado', 'ok');
  } catch(e) { showAlert('alertFile', e.message); }
}

async function uploadFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['docx','odt'].includes(ext)) {
    showAlert('alertUpload', 'Formato no válido. Usa .docx o .odt'); return;
  }
  if (file.size > 20 * 1024 * 1024) {
    showAlert('alertUpload', 'Archivo demasiado grande (máx 20 MB)'); return;
  }
  const area = document.getElementById('uploadArea');
  area.style.opacity = '.5';
  area.querySelector('.uploadLabel').textContent = 'Subiendo…';
  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/cuentos/upload', {
      method: 'POST',
      headers: {'Authorization': 'Bearer '+token, 'ngrok-skip-browser-warning':'1'},
      body: form
    });
    if (!r.ok) throw new Error('Error al subir');
    const d = await r.json();
    showAlert('alertUpload', '✓ Subido: ' + (d.title || file.name), 'ok');
    const files = await api('GET', '/api/cuentos');
    renderFiles(files);
  } catch(e) { showAlert('alertUpload', e.message); }
  finally {
    area.style.opacity = '';
    area.querySelector('.uploadLabel').textContent = 'Arrastra un archivo o toca para elegir';
    document.getElementById('fileInput').value = '';
  }
}

function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load();
</script>

<!-- Sistema de Navegación Unificada -->
<script src="/static/js/unified-nav.js"></script>

</body>
</html>
