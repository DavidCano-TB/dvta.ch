<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04040A">
<title>Admin — Pasapalabra</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/bank/static/css/unified-nav.css">
<style>
:root{
  --gold:#D4A843;--gold2:#F0C866;--gold3:#8B6010;--gold4:#5A3A06;
  --noir:#04040A;--n2:#08080F;--n3:#0C0C1A;--n4:#111120;
  --glass:rgba(255,255,255,.04);
  --border:rgba(212,168,67,.13);--border2:rgba(212,168,67,.30);
  --text:#EAE6D8;--text2:#9A9070;--text3:#504430;
  --green:#38B87A;--red:#C83060;--blue:#4878D8;
  --r:10px;--rL:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;height:100%;}
body{background:var(--noir);color:var(--text);font-family:'DM Mono',monospace;min-height:100%;-webkit-font-smoothing:antialiased;padding-bottom:40px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--gold4);border-radius:2px;}
button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;}
.hdr{position:sticky;top:0;z-index:100;background:rgba(4,4,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;height:60px;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3) 30%,var(--gold) 50%,var(--gold3) 70%,transparent);}

.hdrIcon{font-size:1.4rem;}
.hdrTitle{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);flex:1;}
.badge{padding:3px 10px;border-radius:20px;font-size:.62rem;letter-spacing:.1em;font-weight:600;border:1px solid var(--border);color:var(--text3);}
.badge.on{background:rgba(56,184,122,.12);border-color:rgba(56,184,122,.4);color:var(--green);}
.badge.off{background:rgba(255,255,255,.04);border-color:var(--border);}
.wrap{max-width:600px;margin:0 auto;padding:24px 16px;}
.section{background:var(--n3);border:1px solid var(--border);border-radius:var(--rL);padding:20px;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.4);}
.sTitle{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--gold2);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);letter-spacing:.03em;}
.statusRow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.statusDot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--text3);transition:all .3s;}
.statusDot.on{background:var(--green);box-shadow:0 0 8px rgba(56,184,122,.5);}
.statusText{font-size:.78rem;color:var(--text2);}
.btnRow{display:flex;gap:8px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid;border-radius:var(--r);padding:9px 18px;font-size:.72rem;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.06em;transition:all .2s;cursor:pointer;text-decoration:none;}
.btnG{background:rgba(56,184,122,.12);border-color:rgba(56,184,122,.4);color:var(--green);}
.btnG:hover:not(:disabled){background:rgba(56,184,122,.22);border-color:var(--green);box-shadow:0 0 16px rgba(56,184,122,.2);}
.btnR{background:rgba(200,48,96,.12);border-color:rgba(200,48,96,.4);color:#e05080;}
.btnR:hover:not(:disabled){background:rgba(200,48,96,.22);border-color:var(--red);}
.btnS{background:rgba(72,120,216,.12);border-color:rgba(72,120,216,.4);color:var(--blue);}
.btnS:hover:not(:disabled){background:rgba(72,120,216,.22);border-color:var(--blue);}
.btnO{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.35);color:var(--gold2);}
.btnO:hover:not(:disabled){background:rgba(212,168,67,.2);border-color:var(--gold);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.w100{width:100%;}
.btnSm{padding:6px 12px;font-size:.68rem;}
.lbl{font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;}
.inp{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;outline:none;transition:all .2s;}
.inp:focus{border-color:var(--gold);background:rgba(212,168,67,.05);box-shadow:0 0 0 3px rgba(212,168,67,.07);}
.inp::placeholder{color:var(--text3);}
.sel{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.sel:focus{border-color:var(--gold);}
.sel option{background:var(--n4);}
.acWrap{position:relative;margin-bottom:8px;}
.acDrop{display:none;position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--n2);border:1px solid var(--border2);border-top:none;border-radius:0 0 var(--r) var(--r);max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.7);}
.acDrop.open{display:block;}
.acItem{padding:8px 12px;font-size:.75rem;color:var(--text2);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.acItem:last-child{border-bottom:none;}
.acItem:hover,.acItem.hi{background:rgba(212,168,67,.08);color:var(--text);}
.acItem b{color:var(--gold2);font-weight:600;}
.pills{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin:6px 0;align-items:center;}
.pill{display:inline-flex;align-items:center;gap:5px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);border-radius:20px;padding:3px 10px;font-size:.68rem;color:var(--gold2);}
.pillX{background:none;border:none;color:var(--gold3);padding:0 0 0 2px;font-size:.8rem;cursor:pointer;line-height:1;}
.pillX:hover{color:var(--red);}
.pillCount{font-size:.58rem;color:var(--text3);margin-bottom:8px;}
.alert{font-size:.72rem;min-height:0;max-height:0;overflow:hidden;border-radius:var(--r);transition:all .3s;margin-top:0;}
.alert.on{padding:9px 12px;max-height:60px;margin-top:8px;}
.alert.ok{background:rgba(56,184,122,.1);border:1px solid rgba(56,184,122,.3);color:var(--green);}
.alert.err{background:rgba(200,48,96,.1);border:1px solid rgba(200,48,96,.3);color:#e05080;}
.playerCard{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.playerCard.active{border-color:rgba(56,184,122,.4);background:rgba(56,184,122,.05);}
.playerCard.done{opacity:.5;}
.playerName{font-size:.8rem;color:var(--text);flex:1;}
</style>
</head>
<body class="has-unified-nav">
<!-- Navegación Unificada -->
<div id="unifiedNavContainer"></div>

  <span class="badge off" id="badge">—</span>
</div>

<div class="wrap">

  <div class="section">
    <div class="sTitle">Estado del juego</div>
    <div class="statusRow">
      <div class="statusDot off" id="dot"></div>
      <div class="statusText"><strong id="statusText">Cargando…</strong></div>
    </div>
    <div class="btnRow">
      <button class="btn btnG btnSm" id="btnOn"    onclick="toggle(true)"   style="display:none">▶ Activar</button>
      <button class="btn btnR btnSm" id="btnOff"   onclick="toggle(false)"  style="display:none">■ Desactivar</button>
      <button class="btn btnO btnSm" id="btnReset" onclick="resetGame()"    style="display:none">↺ Reiniciar</button>
      <button class="btn btnS btnSm" id="btnOpen"  onclick="openGame()"     style="display:none">↗ Abrir juego</button>
    </div>
    <div class="alert" id="alert1"></div>
  </div>

  <div class="section" id="secPlayers" style="display:none">
    <div class="sTitle">🎮 Jugadores en partida</div>
    <div id="playersGrid"></div>
  </div>

  <div class="section">
    <div class="sTitle">⚙ Configurar nueva partida</div>
    <div style="margin-bottom:14px">
      <div class="lbl">⏱ Tiempo por rosco (segundos)</div>
      <select class="sel" id="roscoTime">
        <option value="300">300 s — 5 min</option>
        <option value="400">400 s — 6:40</option>
        <option value="500" selected>500 s — 8:20</option>
        <option value="600">600 s — 10 min</option>
        <option value="900">900 s — 15 min</option>
      </select>
    </div>
    <div class="lbl">👥 Jugadores (máx 10)</div>
    <div class="acWrap">
      <input class="inp" id="acIn" type="text" autocomplete="off"
        placeholder="🔍 Buscar usuario…"
        oninput="acFilter()" onkeydown="acKey(event)" onfocus="acFilter()">
      <div class="acDrop" id="acDrop"></div>
    </div>
    <div class="pills" id="pills"><span style="font-size:.62rem;color:var(--text3)">Añade jugadores…</span></div>
    <div class="pillCount" id="pillCount">0 / 10</div>
    <button class="btn btnG w100" id="btnStart" onclick="startGame()" disabled style="margin-top:14px">
      ▶ Iniciar partida
    </button>
    <div class="alert" id="alert2"></div>
  </div>

</div>

<script>
'use strict';
const token = localStorage.getItem('dvd_token');
let allUsers = [], players = [], acIdx = -1, enabled = false;
let wsConn = null;
const wsBase = location.protocol === 'https:' ? 'wss://' + location.host : 'ws://' + location.host;

async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+token,'ngrok-skip-browser-warning':'1'},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.detail || 'Error '+r.status); }
  return r.json();
}

function showAlert(id, msg, type='err') {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert on ' + type;
  setTimeout(() => { el.className = 'alert'; }, 4000);
}

async function load() {
  if (!token) { location.href = '/'; return; }
  try { const me = await api('GET', '/api/me'); if (!me.is_admin) { location.href = '/'; return; } }
  catch { location.href = '/'; return; }
  try {
    const [status, users] = await Promise.all([
      api('GET', '/api/pasapalabra/status'),
      api('GET', '/api/pasapalabra/users'),
    ]);
    enabled = !!status.enabled;
    allUsers = users || [];
    updateStatus();
    connectWS();
  } catch(e) { showAlert('alert1', e.message); }
}

function updateStatus() {
  document.getElementById('dot').className = 'statusDot ' + (enabled ? 'on' : 'off');
  document.getElementById('badge').textContent = enabled ? '🟢 Activo' : '⚫ Desactivado';
  document.getElementById('badge').className   = 'badge ' + (enabled ? 'on' : 'off');
  document.getElementById('statusText').textContent = enabled ? 'Juego activo' : 'Juego desactivado';
  document.getElementById('btnOn').style.display    = enabled ? 'none' : '';
  document.getElementById('btnOff').style.display   = enabled ? '' : 'none';
  document.getElementById('btnReset').style.display = enabled ? '' : 'none';
  document.getElementById('btnOpen').style.display  = enabled ? '' : 'none';
}

function connectWS() {
  if (wsConn && wsConn.readyState < 2) return;
  wsConn = new WebSocket(wsBase + '/ws/pasapalabra?token=' + encodeURIComponent(token));
  wsConn.onmessage = e => { try { handleState(JSON.parse(e.data)); } catch(_){} };
  wsConn.onclose   = () => { setTimeout(connectWS, 3000); };
  wsConn.onerror   = () => {};
}

function handleState(data) {
  if (data.type !== 'state') return;
  enabled = !!data.enabled;
  updateStatus();
  const ps = data.players || [];
  const sec = document.getElementById('secPlayers');
  const grid = document.getElementById('playersGrid');
  if (ps.length && data.status !== 'waiting') {
    sec.style.display = '';
    const cur = data.current_player_idx ?? -1;
    grid.innerHTML = ps.map((p, i) => {
      const active = i === cur && !p.done;
      const t = p.time_remaining != null ? fmtT(p.time_remaining) : '—';
      const done = Object.values(p.letters||{}).filter(v=>v!=='pending').length;
      return `<div class="playerCard ${active?'active':''} ${p.done?'done':''}">
        <div style="font-size:.9rem">${active?'▶':p.done?'✓':'○'}</div>
        <div class="playerName">@${esc(p.username)}</div>
        <div style="font-size:.62rem;color:var(--text3)">${done}/26</div>
        <div style="font-family:'Playfair Display',serif;color:var(--gold2);font-size:.9rem">${p.score}✓</div>
        <div style="font-size:.62rem;color:var(--text3)">⏱${t}</div>
      </div>`;
    }).join('');
  } else {
    sec.style.display = 'none';
  }
}

function fmtT(s) { if (s==null||s<0) return '—'; return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0'); }
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function toggle(on) {
  try {
    await api('POST', '/api/pasapalabra/toggle', { enabled: on });
    enabled = on; updateStatus();
    showAlert('alert1', on ? '✓ Pasapalabra activado' : 'Pasapalabra desactivado', 'ok');
  } catch(e) { showAlert('alert1', e.message); }
}

async function resetGame() {
  if (!confirm('¿Reiniciar la partida?')) return;
  try {
    await api('POST', '/api/pasapalabra/reset');
    showAlert('alert1', '✓ Partida reiniciada', 'ok');
  } catch(e) { showAlert('alert1', e.message); }
}

function openGame() { window.open('/pasapalabra?token=' + encodeURIComponent(token), '_blank'); }

async function startGame() {
  if (!players.length) { showAlert('alert2', 'Añade al menos un jugador'); return; }
  const roscoTime = parseInt(document.getElementById('roscoTime').value);
  const btn = document.getElementById('btnStart');
  btn.disabled = true; btn.textContent = '⏳ Iniciando…';
  try {
    await api('POST', '/api/pasapalabra/setup', { players: players.slice(), rosco_time: roscoTime });
    enabled = true; updateStatus();
    showAlert('alert2', '✓ Partida iniciada — abriendo juego…', 'ok');
    setTimeout(openGame, 700);
  } catch(e) { showAlert('alert2', e.message); }
  finally { btn.disabled = !players.length; btn.textContent = '▶ Iniciar partida'; }
}

function acFilter() {
  const q = document.getElementById('acIn').value.trim().toLowerCase();
  const dd = document.getElementById('acDrop'); acIdx = -1;
  if (!q) { dd.classList.remove('open'); return; }
  const hits = allUsers.filter(u => !players.includes(u) && u.toLowerCase().includes(q)).slice(0,8);
  if (!hits.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = hits.map(u => {
    const p = u.toLowerCase().indexOf(q);
    const h = p>=0 ? u.slice(0,p)+'<b>'+u.slice(p,p+q.length)+'</b>'+u.slice(p+q.length) : u;
    return `<div class="acItem" onmousedown="event.preventDefault();addPlayer('${u}')">@${h}</div>`;
  }).join('');
  dd.classList.add('open');
}

function acKey(e) {
  const items = document.querySelectorAll('#acDrop .acItem');
  if (e.key==='ArrowDown')  { e.preventDefault(); acIdx=Math.min(acIdx+1,items.length-1); items.forEach((r,i)=>r.classList.toggle('hi',i===acIdx)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); acIdx=Math.max(acIdx-1,0); items.forEach((r,i)=>r.classList.toggle('hi',i===acIdx)); }
  else if (e.key==='Enter') { e.preventDefault(); if(acIdx>=0&&items[acIdx])items[acIdx].dispatchEvent(new Event('mousedown')); }
  else if (e.key==='Escape') document.getElementById('acDrop').classList.remove('open');
}

function addPlayer(u) {
  if (!u||players.includes(u)||players.length>=10) return;
  players.push(u);
  document.getElementById('acIn').value = '';
  document.getElementById('acDrop').classList.remove('open');
  renderPills();
}
function removePlayer(i) { players.splice(i,1); renderPills(); }
function renderPills() {
  const el = document.getElementById('pills');
  el.innerHTML = players.length
    ? players.map((u,i)=>`<span class="pill">@${u}<button class="pillX" onclick="removePlayer(${i})">✕</button></span>`).join('')
    : '<span style="font-size:.62rem;color:var(--text3)">Añade jugadores…</span>';
  document.getElementById('pillCount').textContent = players.length+' / 10';
  document.getElementById('btnStart').disabled = !players.length;
}

load();
</script>

<!-- Sistema de Navegación Unificada -->
<script src="/bank/static/js/unified-nav.js"></script>

</body>
</html>
